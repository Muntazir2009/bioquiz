<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Intelligence Panel</title>
<link rel="stylesheet" href="css/ask.css">
<style>
#aiBtn {
  border-color: #a855f7;
  color: #a855f7;
}
#aiBtn:hover {
  background: #a855f7;
  color: #000;
  box-shadow: 0 0 18px rgba(168,85,247,.45);
}
#aiBtn:disabled {
  opacity: .45;
  cursor: not-allowed;
  transform: none;
}
.ai-block {
  margin-top: 28px;
  border-top: 1px solid rgba(168,85,247,.3);
  padding-top: 22px;
}
.ai-label {
  font-size: .72rem;
  letter-spacing: .2em;
  color: #a855f7;
  margin-bottom: 10px;
}
.ai-text {
  font-size: .93rem;
  line-height: 1.9;
  color: #e8d8ff;
  font-family: "Inter", system-ui, sans-serif;
}
.ai-cursor {
  display: inline-block;
  width: 2px;
  height: 1em;
  background: #a855f7;
  margin-left: 2px;
  vertical-align: middle;
  animation: blink .7s steps(1) infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  #compareBtn {
  border-color: #f59e0b;
  color: #f59e0b;
}
#compareBtn:hover {
  background: #f59e0b;
  color: #000;
  box-shadow: 0 0 18px rgba(245,158,11,.45);
}
#compareBtn:disabled {
  opacity: .45;
  cursor: not-allowed;
  transform: none;
}
.compare-block {
  margin-top: 28px;
  border-top: 1px solid rgba(245,158,11,.3);
  padding-top: 22px;
}
.compare-label {
  font-size: .72rem;
  letter-spacing: .2em;
  color: #f59e0b;
  margin-bottom: 10px;
}
.compare-text {
  font-size: .93rem;
  line-height: 1.9;
  color: #fff8e8;
  font-family: "Inter", system-ui, sans-serif;
  white-space: pre-wrap;
}
  
</style>
</head>
<body>

<div class="console">

  <div class="header">
    <div class="title">MISSION INTELLIGENCE PANEL</div>
    <div class="right">
      <span class="status">● ONLINE</span>
      <span id="clock"></span>
    </div>
  </div>

<div class="input-area">
  <span class="prompt">></span>
  <input id="query" placeholder="Enter topic or command...">
</div>

<div class="input-area" id="compareArea" style="display:none;margin-top:10px;">
  <span class="prompt" style="color:#f59e0b;">vs</span>
  <input id="query2" placeholder="Enter second topic to compare...">
</div>

<div class="controls">
  <button id="searchBtn">EXECUTE</button>
  <button id="aiBtn">ASK AI</button>
  <button id="compareBtn">COMPARE</button>
  <button id="clearBtn">CLEAR</button>
</div>

  <div id="result" class="result"></div>

</div>

<script src="js/ask.js"></script>
</body>
</html>
