<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ask Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}

:root{
  --bg:        #080c14;
  --surface:   #0c1220;
  --card:      #101828;
  --border:    rgba(148,163,184,.1);
  --border-hi: rgba(148,163,184,.2);
  --accent:    #7dd3fc;   /* soft sky blue */
  --accent2:   #a5b4fc;   /* soft indigo */
  --accent3:   #6ee7b7;   /* soft emerald */
  --dim1:      rgba(125,211,252,.1);
  --dim2:      rgba(165,180,252,.1);
  --text:      #e2e8f0;
  --sub:       rgba(226,232,240,.55);
  --muted:     #334155;
  --hot:       #fda4af;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  display:flex;flex-direction:column;
}

/* ── STATIC BG — no animation = zero lag ── */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 100% 70% at 50% -5%,  rgba(99,130,255,.1)  0%, transparent 55%),
    radial-gradient(ellipse 60%  50% at 0%   70%,  rgba(80,180,255,.07) 0%, transparent 50%),
    radial-gradient(ellipse 55%  45% at 100% 90%,  rgba(120,80,255,.06) 0%, transparent 50%);
}

/* ── SHELL ── */
.shell{
  position:relative;z-index:1;
  height:100vh;display:flex;flex-direction:column;
  max-width:820px;margin:0 auto;width:100%;padding:0 24px;
}

/* ═══════════════════════════
   TOPBAR
═══════════════════════════ */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 0;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.tb-left{display:flex;align-items:center;gap:12px}

.back-btn{
  font-family:'Orbitron',monospace;font-size:.5rem;letter-spacing:.15em;
  color:var(--muted);text-decoration:none;
  border:1px solid var(--border);padding:7px 14px;border-radius:6px;
  background:rgba(255,255,255,.02);
  transition:color .2s,border-color .2s,background .2s;
}
.back-btn:hover{color:var(--accent);border-color:rgba(125,211,252,.3);background:var(--dim1)}

.brand{
  font-family:'Orbitron',monospace;font-size:.75rem;font-weight:700;
  letter-spacing:.28em;color:var(--accent);
}

.tb-right{display:flex;align-items:center;gap:14px}
.badge{
  font-family:'Orbitron',monospace;font-size:.48rem;letter-spacing:.18em;
  color:var(--accent3);
  border:1px solid rgba(110,231,183,.18);
  padding:5px 11px;border-radius:4px;
  background:rgba(110,231,183,.05);
  display:flex;align-items:center;gap:5px;
}
.badge::before{
  content:'';width:4px;height:4px;border-radius:50%;
  background:var(--accent3);box-shadow:0 0 6px var(--accent3);
  animation:dot-pulse 2.5s ease infinite;
}
@keyframes dot-pulse{0%,100%{opacity:1}50%{opacity:.3}}
#clock{font-family:'Orbitron',monospace;font-size:.5rem;letter-spacing:.1em;color:var(--muted)}

/* ═══════════════════════════
   PANEL
═══════════════════════════ */
.panel{
  flex:1;display:flex;flex-direction:column;
  margin:16px 0 20px;
  border-radius:16px;overflow:hidden;
  border:1px solid var(--border);
  background:rgba(10,14,24,.96);
  box-shadow:0 24px 64px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.03) inset;
  position:relative;
}

/* soft glow line at top */
.panel::before{
  content:'';
  position:absolute;top:0;left:8%;width:84%;height:1px;
  background:linear-gradient(to right,transparent,var(--accent2),var(--accent),var(--accent2),transparent);
  opacity:.4;
}

/* ── PANEL HEADER ── */
.p-head{
  display:flex;align-items:center;gap:16px;
  padding:18px 24px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}

/* DNA LOGO */
.logo-wrap{
  width:40px;height:40px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  border:1px solid var(--border-hi);border-radius:10px;
  background:rgba(255,255,255,.03);
}
.logo-wrap svg{width:22px;height:22px;opacity:.7}

.p-titles{display:flex;flex-direction:column;gap:2px;flex:1}
.p-title{
  font-family:'Orbitron',monospace;font-size:.8rem;font-weight:700;
  letter-spacing:.22em;color:var(--accent);
}
.p-sub{font-size:.7rem;color:var(--muted);letter-spacing:.04em}

/* ── INPUT ── */
.input-row{
  display:flex;align-items:center;
  padding:0 24px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  transition:background .25s;
}
.input-row:focus-within{background:rgba(125,211,252,.025)}

.prompt{
  font-family:'Orbitron',monospace;font-size:.9rem;
  color:var(--accent2);margin-right:14px;flex-shrink:0;
  opacity:.8;
}

#query{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--text);font-family:'Inter',sans-serif;
  font-size:1rem;padding:18px 0;letter-spacing:.02em;
}
#query::placeholder{color:var(--muted)}

/* hidden compare — kept for ask.js */
#compareArea{
  display:none;align-items:center;
  padding:0 24px;border-bottom:1px solid var(--border);flex-shrink:0;
}
#query2{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--text);font-family:'Inter',sans-serif;
  font-size:1rem;padding:15px 0;
}
#query2::placeholder{color:var(--muted)}

/* ── CONTROLS ── */
.controls{
  display:flex;gap:10px;padding:14px 24px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;flex-wrap:wrap;
}

button{
  font-family:'Orbitron',monospace;font-size:.58rem;
  font-weight:600;letter-spacing:.14em;
  padding:12px 24px;border-radius:8px;
  background:transparent;cursor:pointer;border:1px solid;
  transition:background .2s,box-shadow .2s,transform .15s,border-color .2s;
}
button:hover{transform:translateY(-1px)}
button:active{transform:scale(.97)}
button:disabled{opacity:.35;cursor:not-allowed;transform:none!important;box-shadow:none!important}

#searchBtn{
  border-color:rgba(125,211,252,.35);color:var(--accent);
  background:rgba(125,211,252,.04);
}
#searchBtn:hover{
  background:rgba(125,211,252,.1);
  border-color:rgba(125,211,252,.6);
  box-shadow:0 0 20px rgba(125,211,252,.15),0 4px 14px rgba(0,0,0,.35);
}

#aiBtn{
  border-color:rgba(165,180,252,.35);color:var(--accent2);
  background:rgba(165,180,252,.04);
}
#aiBtn:hover{
  background:rgba(165,180,252,.1);
  border-color:rgba(165,180,252,.6);
  box-shadow:0 0 20px rgba(165,180,252,.15),0 4px 14px rgba(0,0,0,.35);
}
#aiBtn:disabled{opacity:.35;transform:none;box-shadow:none}

#clearBtn{
  border-color:rgba(253,164,175,.25);color:var(--hot);
  background:rgba(253,164,175,.04);
}
#clearBtn:hover{
  background:rgba(253,164,175,.08);
  border-color:rgba(253,164,175,.5);
  box-shadow:0 0 18px rgba(253,164,175,.12),0 4px 14px rgba(0,0,0,.3);
}

#compareBtn{display:none!important}

/* ── RESULT ── */
#result{
  flex:1;padding:24px;
  overflow-y:auto;overflow-x:hidden;
  font-size:.93rem;line-height:1.85;
}
#result::-webkit-scrollbar{width:4px}
#result::-webkit-scrollbar-thumb{background:rgba(148,163,184,.15);border-radius:4px}
#result::-webkit-scrollbar-thumb:hover{background:rgba(148,163,184,.3)}

#result h2{
  font-family:'Orbitron',monospace;
  font-size:.95rem;font-weight:700;letter-spacing:.08em;
  color:var(--accent);margin-bottom:14px;
}
#result p{color:var(--sub);margin-bottom:12px}
#result img{
  max-width:100%;border-radius:10px;margin:14px 0;display:block;
  border:1px solid var(--border-hi);
  box-shadow:0 10px 36px rgba(0,0,0,.55);
}

.meta{
  font-family:'Orbitron',monospace;font-size:.5rem;
  letter-spacing:.12em;color:var(--muted);margin-top:8px;
}
.loading{
  font-family:'Orbitron',monospace;font-size:.6rem;
  letter-spacing:.18em;color:var(--muted);
}

/* ── ACTION BAR ── */
.action-bar{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
.action-bar button{
  font-size:.52rem;padding:9px 16px;
  border-color:rgba(125,211,252,.2);color:var(--accent);
  background:rgba(125,211,252,.03);
}
.action-bar button:hover{background:rgba(125,211,252,.08);border-color:rgba(125,211,252,.4)}

/* ── AI BLOCK ── */
.ai-block{
  margin-top:18px;
  border:1px solid rgba(165,180,252,.18);
  border-radius:10px;overflow:hidden;
}
.ai-label{
  font-family:'Orbitron',monospace;font-size:.52rem;letter-spacing:.18em;
  color:var(--accent2);
  padding:9px 16px;
  background:rgba(165,180,252,.07);
  border-bottom:1px solid rgba(165,180,252,.1);
  display:flex;align-items:center;gap:7px;
}
.ai-label::before{
  content:'';width:5px;height:5px;border-radius:50%;
  background:var(--accent2);box-shadow:0 0 7px rgba(165,180,252,.6);
  animation:dot-pulse 1.5s ease infinite;
}
.ai-text{
  padding:16px;font-size:.9rem;line-height:1.85;
  color:rgba(226,232,240,.82);font-family:'Inter',sans-serif;
  white-space:pre-wrap;
}
.ai-cursor{
  display:inline-block;width:2px;height:.9em;
  background:var(--accent2);margin-left:2px;vertical-align:middle;
  animation:blink .7s steps(1) infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* compare block */
.compare-block{
  margin-top:18px;border:1px solid rgba(110,231,183,.18);
  border-radius:10px;overflow:hidden;
}
.compare-label{
  font-family:'Orbitron',monospace;font-size:.52rem;letter-spacing:.18em;
  color:var(--accent3);padding:9px 16px;
  background:rgba(110,231,183,.06);border-bottom:1px solid rgba(110,231,183,.1);
  display:flex;align-items:center;gap:7px;
}
.compare-label::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--accent3)}
.compare-text{
  padding:16px;font-size:.9rem;line-height:1.85;
  color:rgba(226,232,240,.8);font-family:'Inter',sans-serif;white-space:pre-wrap;
}

@media(max-width:600px){
  .shell{padding:0 14px}
  .controls{gap:7px}
  button{padding:11px 16px;font-size:.52rem}
}
</style>
</head>
<body>
<div class="shell">

  <div class="topbar">
    <div class="tb-left">
      <a href="index.html" class="back-btn">← HOME</a>
      <div class="brand">ASK PANEL</div>
    </div>
    <div class="tb-right">
      <div class="badge">ONLINE</div>
      <div id="clock"></div>
    </div>
  </div>

  <div class="panel">

    <div class="p-head">
      <!-- DNA icon — colorless/white -->
      <div class="logo-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:#e2e8f0">
          <path d="M4 4c2 2 6 2 8 0s6-2 8 0"/>
          <path d="M4 20c2-2 6-2 8 0s6 2 8 0"/>
          <path d="M4 4c0 5.5 16 5.5 16 8S4 15.5 4 20"/>
          <line x1="7" y1="8.5" x2="17" y2="8.5"/>
          <line x1="7" y1="15.5" x2="17" y2="15.5"/>
          <line x1="6" y1="12" x2="18" y2="12"/>
        </svg>
      </div>
      <div class="p-titles">
        <div class="p-title">ASK PANEL</div>
        <div class="p-sub">Wikipedia · Cloudflare AI · Speech · Download</div>
      </div>
    </div>

    <div class="input-row">
      <span class="prompt">›</span>
      <input id="query" placeholder="Enter a biology topic or command...">
    </div>

    <div id="compareArea">
      <span style="font-family:'Orbitron',monospace;font-size:.85rem;color:var(--accent3);margin-right:14px;opacity:.8">vs</span>
      <input id="query2" placeholder="Enter second topic to compare...">
    </div>

    <div class="controls">
      <button id="searchBtn">EXECUTE</button>
      <button id="aiBtn">ASK AI</button>
      <button id="compareBtn"></button>
      <button id="clearBtn">CLEAR</button>
    </div>

    <div id="result"></div>

  </div>

</div>
<script src="js/ask.js"></script>
</body>
</html>
