<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BioQuiz — Learn. Explore. Master.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700;900&family=Barlow+Condensed:ital,wght@0,200;0,300;0,400;0,600;0,700;1,300&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════
   RESET & TOKENS
════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}
:root{
  --bg:#080808;--white:#fff;
  --white-80:rgba(255,255,255,.8);--white-50:rgba(255,255,255,.5);
  --white-20:rgba(255,255,255,.2);--white-10:rgba(255,255,255,.1);
  --white-06:rgba(255,255,255,.06);
  --blue:#003791;--blue-light:#0070d1;--blue-glow:rgba(0,112,209,.4);
  --border:rgba(255,255,255,.09);--border-strong:rgba(255,255,255,.18);
  --muted:rgba(255,255,255,.3);
  --c-cyan:#00c2ff;--c-violet:#a78bfa;--c-green:#34d399;
  --c-teal:#2dd4bf;--c-amber:#fbbf24;--c-coral:#f87171;--c-pink:#f472b6;
}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--white-80);
  font-family:'Barlow Condensed',sans-serif;
  min-height:100vh;overflow-x:hidden;
}

/* ════════════════════════════════════════
   LOADING SCREEN
════════════════════════════════════════ */
#loader{
  position:fixed;inset:0;z-index:9999;
  background:#000;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  transition:opacity .6s ease;
}
#loader.hide{opacity:0;pointer-events:none}

/* zoom-out exit — transform+opacity only */
.ld-content{
  display:flex;flex-direction:column;align-items:center;
  will-change:transform,opacity;
  transition:transform .7s cubic-bezier(.4,0,.2,1),opacity .7s ease;
}
.ld-content.zoom{transform:scale(1.14) translateY(-6px);opacity:0}

/* BIOQUIZ title — simple fade+slide, no blur */
.ld-title{
  font-family:'Rajdhani',sans-serif;font-weight:900;
  font-size:clamp(2.8rem,10vw,6.5rem);
  letter-spacing:.42em;
  color:#fff;
  opacity:0;
  will-change:opacity,transform;
  animation:ldTitleIn .7s ease .15s forwards;
  margin-bottom:clamp(20px,4vh,44px);
  position:relative;
}
.ld-title::after{
  content:'';position:absolute;bottom:-12px;left:5%;width:90%;height:1px;
  background:linear-gradient(to right,transparent,rgba(255,255,255,.3),transparent);
}
@keyframes ldTitleIn{
  from{opacity:0;transform:translateY(-10px)}
  to  {opacity:1;transform:translateY(0)}
}

/* MADE BY / MUNTAZIR layout */
.ld-seal-madeby{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:10px}
.ld-seal-name  {display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:clamp(28px,5vh,52px)}

.ld-letter{
  display:inline-block;
  font-family:'Rajdhani',sans-serif;font-weight:900;
  font-size:clamp(1rem,3.5vw,1.8rem);
  letter-spacing:.12em;
  color:rgba(255,255,255,.7);
  text-transform:uppercase;
  opacity:0;
  will-change:opacity,transform;
}
.ld-letter.space{width:.5em;display:inline-block}
.muntazir-letter{font-size:clamp(2rem,7vw,4rem);letter-spacing:.18em;color:#00e5ff}

/* stamp — transform+opacity only, no blur/filter */
@keyframes stamp{
  0%  {opacity:0;transform:scale(2.6) translateY(-8px)}
  45% {opacity:1;transform:scale(.93) translateY(1px)}
  65% {transform:scale(1.04)}
  82% {transform:scale(.98)}
  100%{opacity:1;transform:scale(1)}
}
@keyframes stampCyan{
  0%  {opacity:0;transform:scale(2.8) translateY(-10px)}
  40% {opacity:1;transform:scale(.92) translateY(2px)}
  60% {transform:scale(1.06)}
  78% {transform:scale(.97)}
  100%{opacity:1;transform:scale(1)}
}

/* sub-label */
.ld-sub{
  font-family:'Rajdhani',sans-serif;font-size:.54rem;letter-spacing:.44em;
  color:rgba(255,255,255,.26);text-transform:uppercase;
  opacity:0;will-change:opacity,transform;
  animation:ldSubIn .4s ease 2.2s forwards;
  margin-bottom:clamp(28px,4vh,48px);
}
@keyframes ldSubIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* scan line — REMOVED */
.ld-scanline{display:none}
.ld-meteors {display:none}
.ld-corners {display:none}

/* loading bar — simple, no shimmer, no glow */
.ld-bar-wrap{
  width:clamp(200px,44vw,380px);height:3px;
  background:rgba(255,255,255,.1);
  border-radius:2px;overflow:hidden;
}
.ld-bar-fill{
  height:100%;width:0%;
  background:rgba(255,255,255,.85);
  border-radius:2px;
  transition:width .08s linear;
}
.ld-bar-glow{display:none}
.ld-pct{
  font-family:'Rajdhani',sans-serif;font-size:.5rem;letter-spacing:.2em;
  color:rgba(255,255,255,.35);margin-top:10px;text-align:center;
}

/* ════════════════════════════════════════
   BACKGROUNDS
════════════════════════════════════════ */
.bg-gradient{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 70% 40% at 50% -5%,rgba(0,55,145,.18) 0%,transparent 60%),
    radial-gradient(ellipse 50% 35% at 100% 100%,rgba(0,55,145,.1) 0%,transparent 55%),
    radial-gradient(ellipse 60% 50% at -10% 60%,rgba(0,112,209,.07) 0%,transparent 55%);
}
.bg-grid{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);
  background-size:60px 60px;
  mask-image:radial-gradient(ellipse 90% 90% at 50% 50%,black 0%,transparent 85%);
}
.scanlines{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 3px);
}

/* ════════════════════════════════════════
   MOON
════════════════════════════════════════ */
.moon-wrap{
  position:fixed;top:82px;right:clamp(20px,7vw,110px);z-index:0;
  pointer-events:none;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  animation:moonRise 2.2s cubic-bezier(.16,1,.3,1) .6s both;
}
@keyframes moonRise{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}

.moon-img-wrap{
  width:clamp(80px,10vw,130px);height:clamp(80px,10vw,130px);
  border-radius:50%;overflow:hidden;position:relative;
  box-shadow:
    0 0 0 1px rgba(255,255,255,.07),
    0 0 50px rgba(255,255,255,.09),
    0 0 100px rgba(255,255,255,.04);
}
.moon-img-wrap img{
  width:100%;height:100%;object-fit:cover;
  border-radius:50%;
  filter:brightness(.92) contrast(1.06) saturate(.65);
  display:block;
}
/* atmospheric halo */
.moon-halo{
  position:absolute;inset:-45%;border-radius:50%;
  background:radial-gradient(circle,rgba(220,218,200,.07) 0%,transparent 65%);
  pointer-events:none;
}
/* gentle float */
@keyframes moonFloat{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-7px)}
}
.moon-img-wrap{animation:moonFloat 7s ease-in-out infinite}

/* ════════════════════════════════════════
   PILL NAVBAR
════════════════════════════════════════ */
.navbar{
  position:fixed;top:16px;right:24px;z-index:1000;
  display:flex;align-items:center;gap:2px;
  background:rgba(8,8,8,.92);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border:1px solid var(--border-strong);border-radius:50px;padding:5px 7px;
  box-shadow:0 8px 40px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.04) inset;
  animation:navDrop .6s cubic-bezier(.16,1,.3,1) .1s both;white-space:nowrap;
}
.navbar::before{
  content:'';position:absolute;top:0;left:10%;width:80%;height:1px;
  background:linear-gradient(to right,transparent,rgba(255,255,255,.22),transparent);
  border-radius:50px;
}
@keyframes navDrop{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}

.nav-brand{
  font-family:'Rajdhani',sans-serif;font-size:.62rem;font-weight:700;
  letter-spacing:.22em;color:var(--white);
  padding:6px 14px;display:flex;align-items:center;gap:8px;
  border-right:1px solid var(--border);margin-right:4px;
}
.nav-brand-dot{width:5px;height:5px;border-radius:50%;background:var(--blue-light);box-shadow:0 0 8px var(--blue-glow);animation:pulse 2.5s ease infinite}

.nav-item{position:relative}
.nav-btn{
  display:inline-flex;align-items:center;gap:5px;
  font-family:'Rajdhani',sans-serif;font-size:.58rem;letter-spacing:.12em;font-weight:600;
  color:var(--white-50);background:transparent;border:none;cursor:pointer;
  padding:7px 13px;border-radius:40px;transition:color .2s,background .2s;
}
.nav-btn:hover,.nav-btn.active{color:var(--white);background:var(--white-10)}
.caret{display:inline-block;transition:transform .25s ease}
.nav-btn.active .caret{transform:rotate(180deg)}

/* ── DROPDOWN ── */
.dropdown{
  position:absolute;top:calc(100% + 14px);right:0;
  background:rgba(10,10,10,.98);backdrop-filter:blur(30px);
  border:1px solid var(--border-strong);border-radius:18px;
  padding:8px;width:560px;
  box-shadow:0 28px 70px rgba(0,0,0,.85),0 0 0 1px rgba(255,255,255,.04) inset;
  opacity:0;visibility:hidden;transform:translateY(10px);
  transition:opacity .25s cubic-bezier(.16,1,.3,1),transform .25s cubic-bezier(.16,1,.3,1),visibility .25s;
  pointer-events:none;
  white-space:normal;word-break:break-word;
}
.dropdown::before{
  content:'';position:absolute;top:-5px;right:28px;
  border-left:6px solid transparent;border-right:6px solid transparent;
  border-bottom:6px solid var(--border-strong);
}
.nav-item.open .dropdown{opacity:1;visibility:visible;transform:translateY(0);pointer-events:all}

.dd-head{
  font-family:'Rajdhani',sans-serif;font-size:.46rem;letter-spacing:.32em;
  color:var(--muted);padding:11px 16px 7px;
  border-bottom:1px solid var(--border);margin-bottom:4px;
}

/* What's New rows */
.wn-list{display:flex;flex-direction:column;gap:2px;padding:6px 0;max-height:420px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent}
.wn-row{
  display:flex;align-items:flex-start;gap:12px;padding:10px 16px;
  border-radius:10px;transition:background .18s;cursor:default;
}
.wn-row:hover{background:var(--white-06)}
.wn-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.wn-dot.n{background:#e2e2e2}.wn-dot.f{background:#34d399}.wn-dot.u{background:#a0a0a0}
.wn-body{display:flex;flex-direction:column;gap:3px;flex:1}
.wn-t{font-size:.82rem;font-weight:500;color:var(--white-80)}.wn-d{font-size:.68rem;color:var(--muted);line-height:1.5}
.wn-tag{
  font-family:'Rajdhani',sans-serif;font-size:.38rem;letter-spacing:.14em;
  padding:2px 8px;border-radius:3px;display:inline-block;margin-top:3px;font-weight:600;
}
/* clean minimal tags — no colour, just white tones */
.wn-tag.n{background:rgba(255,255,255,.07);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.14)}
.wn-tag.f{background:rgba(52,211,153,.07);color:#34d399;border:1px solid rgba(52,211,153,.16)}
.wn-tag.u{background:rgba(255,255,255,.05);color:rgba(255,255,255,.45);border:1px solid rgba(255,255,255,.1)}

/* Quote dropdown */
.quote-box{padding:22px 24px 16px;text-align:center}
.quote-mark{color:rgba(255,255,255,.12);margin-bottom:14px}
.quote-mark svg{width:26px;height:26px;fill:currentColor}
.quote-text{
  font-size:1rem;line-height:1.8;
  color:rgba(255,255,255,.72);
  font-style:italic;margin-bottom:14px;
  white-space:normal;word-break:break-word;
}
.quote-author{
  font-family:'Rajdhani',sans-serif;font-size:.52rem;
  letter-spacing:.22em;color:var(--muted);margin-bottom:4px;
}
.quote-ref{
  font-family:'Rajdhani',sans-serif;font-size:.46rem;
  letter-spacing:.18em;color:rgba(255,255,255,.2);
  font-style:normal;
}
.quote-btn{
  width:100%;margin-top:12px;
  font-family:'Rajdhani',sans-serif;font-size:.5rem;letter-spacing:.14em;font-weight:600;
  padding:9px;border-radius:9px;
  background:var(--white-06);border:1px solid var(--border);color:var(--white-50);
  cursor:pointer;transition:background .2s,color .2s,border-color .2s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.quote-btn:hover{background:var(--white-10);color:var(--white);border-color:var(--border-strong)}
.quote-btn svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2.2}
.dd-view-all{
  display:block;text-align:center;margin-top:10px;padding:8px;
  font-family:'Rajdhani',sans-serif;font-size:.46rem;letter-spacing:.16em;
  color:var(--blue-light);text-decoration:none;
  border:1px solid rgba(0,112,209,.2);border-radius:8px;
  background:rgba(0,112,209,.04);
  transition:background .2s,border-color .2s;
}
.dd-view-all:hover{background:rgba(0,112,209,.1);border-color:rgba(0,112,209,.35)}

/* ════════════════════════════════════════
   TOPBAR
════════════════════════════════════════ */

.topbar{
  position:fixed;top:0;left:0;right:0;z-index:400;height:72px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 clamp(16px,4vw,52px);
  background:rgba(8,8,8,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
  animation:slideDown .5s ease .1s both;
}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.tb-left{display:flex;align-items:center;gap:11px}
.tb-logo{height:28px;width:auto;object-fit:contain}
.tb-sep{width:1px;height:32px;background:var(--border)}
.tb-brand-stack{display:flex;flex-direction:column;gap:4px;justify-content:center}
.tb-name{font-family:'Rajdhani',sans-serif;font-size:.78rem;font-weight:700;letter-spacing:.24em;color:var(--white);line-height:1}
/* inline notification pill under BIOQUIZ */
.tb-alert-pill{
  display:inline-flex;align-items:center;gap:5px;
  font-family:'Rajdhani',sans-serif;font-size:.42rem;letter-spacing:.1em;font-weight:600;
  color:rgba(255,255,255,.55);
  text-decoration:none;
  transition:color .2s;
  line-height:1;
  white-space:nowrap;
}
.tb-alert-pill:hover{color:rgba(255,255,255,.9)}
.tb-alert-dot{
  width:5px;height:5px;border-radius:50%;flex-shrink:0;
  background:#f87171;box-shadow:0 0 5px rgba(248,113,113,.7);
  animation:pulse 1.8s ease infinite;
}
.tb-alert-pill svg{opacity:.5;transition:opacity .2s,transform .2s}
.tb-alert-pill:hover svg{opacity:1;transform:translate(1px,-1px)}
.tb-dot{width:5px;height:5px;border-radius:50%;background:var(--blue-light);box-shadow:0 0 8px var(--blue-glow);animation:pulse 2.5s ease infinite}
.tb-right{display:flex;align-items:center;gap:12px}
.tb-status{
  font-family:'Rajdhani',sans-serif;font-size:.5rem;letter-spacing:.18em;
  color:#34d399;border:1px solid rgba(52,211,153,.2);padding:4px 11px;
  border-radius:4px;background:rgba(52,211,153,.05);display:flex;align-items:center;gap:6px;
}
.tb-status::before{content:'';width:4px;height:4px;border-radius:50%;background:#34d399;box-shadow:0 0 6px #34d399;animation:pulse 2s ease infinite}
/* 12h clock — styled */
#clock{
  font-family:'Rajdhani',sans-serif;font-size:.78rem;letter-spacing:.08em;
  color:var(--white);min-width:84px;text-align:right;font-weight:700;
  background:rgba(255,255,255,.05);border:1px solid var(--border);
  padding:4px 10px;border-radius:6px;
}
#clock .ampm{font-size:.42rem;letter-spacing:.18em;color:var(--muted);margin-left:4px;font-weight:500;vertical-align:middle}
.streak-pill{
  font-family:'Rajdhani',sans-serif;font-size:.48rem;letter-spacing:.14em;
  color:#fbbf24;border:1px solid rgba(251,191,36,.22);
  padding:4px 10px;border-radius:4px;background:rgba(251,191,36,.06);
  display:flex;align-items:center;gap:5px;cursor:default;
}

/* ════════════════════════════════════════
   MAIN WRAP
════════════════════════════════════════ */
.wrap{position:relative;z-index:2;min-height:100vh;padding:88px clamp(16px,4.5vw,60px) 60px;max-width:1320px;margin:0 auto}

/* ════════════════════════════════════════
   HERO
════════════════════════════════════════ */
.hero{padding:clamp(40px,7vh,90px) 0 clamp(24px,4vh,48px);display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center}
.hero-left{opacity:0;animation:slideUp .8s cubic-bezier(.16,1,.3,1) .3s forwards}

.hero-eyebrow{display:inline-flex;align-items:center;gap:10px;margin-bottom:22px}
.eyebrow-line{width:28px;height:1px;background:linear-gradient(to right,rgba(0,112,209,.7),transparent)}
.eyebrow-text{
  font-family:'Rajdhani',sans-serif;font-size:.54rem;letter-spacing:.38em;font-weight:700;
  background:linear-gradient(90deg,#4fa8e8 0%,#a8d4f8 30%,#fff 50%,#a8d4f8 70%,#4fa8e8 100%);
  background-size:250%;background-clip:text;-webkit-background-clip:text;color:transparent;
  animation:gradShift 5s ease infinite;white-space:nowrap;position:relative;
}
.eyebrow-text::after{
  content:'';position:absolute;bottom:-3px;left:0;right:0;height:1px;
  background:linear-gradient(to right,transparent,rgba(79,168,232,.4),transparent);
}
@keyframes gradShift{0%{background-position:0%}50%{background-position:100%}100%{background-position:0%}}

.hero-title{font-family:'Rajdhani',sans-serif;font-size:clamp(3rem,5.8vw,6rem);font-weight:700;line-height:.92;letter-spacing:-.01em;margin-bottom:22px}
.l1{color:var(--white)}.l2{color:rgba(255,255,255,.22);-webkit-text-stroke:1px rgba(255,255,255,.38)}.l3{color:var(--white);text-shadow:0 0 60px rgba(255,255,255,.15),0 0 120px rgba(0,112,209,.2)}
.hero-desc{font-size:1rem;font-weight:300;color:var(--white-50);line-height:1.8;max-width:430px;margin-bottom:32px;letter-spacing:.02em}
.hero-btns{display:flex;gap:10px;flex-wrap:wrap}
.btn-launch{display:inline-flex;align-items:center;gap:8px;background:var(--white);color:#080808;font-family:'Rajdhani',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.14em;padding:13px 26px;border-radius:8px;text-decoration:none;transition:all .3s cubic-bezier(.34,1.2,.64,1)}
.btn-launch:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 0 40px rgba(255,255,255,.18),0 14px 34px rgba(0,0,0,.5)}
.btn-launch svg{width:13px;height:13px;fill:none;stroke:#080808;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
/* 🔥 fire presentation button */
.btn-fire{background:#ff4500;color:#fff;box-shadow:0 0 28px rgba(255,69,0,.45),0 4px 16px rgba(255,69,0,.3)}
.btn-fire svg{stroke:#fff}
.btn-fire:hover{background:#ff5a1f;box-shadow:0 0 50px rgba(255,69,0,.65),0 0 90px rgba(255,69,0,.2),0 14px 34px rgba(0,0,0,.5)}
.btn-outline{display:inline-flex;align-items:center;gap:8px;background:transparent;color:var(--white-80);font-family:'Rajdhani',sans-serif;font-size:.72rem;letter-spacing:.1em;padding:13px 22px;border-radius:8px;text-decoration:none;border:1px solid var(--border-strong);transition:all .25s}
.btn-outline:hover{border-color:var(--white-50);background:var(--white-10);color:var(--white)}
.btn-outline svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

.hero-right{opacity:0;animation:slideUp .8s cubic-bezier(.16,1,.3,1) .5s forwards;display:flex;flex-direction:column;gap:10px;align-items:flex-end}
.stat-card{width:100%;max-width:270px;border:1px solid var(--border);border-radius:12px;padding:15px 18px;background:linear-gradient(135deg,rgba(24,24,24,.95),rgba(12,12,12,.98));display:flex;align-items:center;gap:14px;transition:all .35s cubic-bezier(.34,1.2,.64,1)}
.stat-card:hover{border-color:var(--border-strong);transform:translateX(-6px);box-shadow:0 0 30px rgba(255,255,255,.04)}
.stat-ic{width:38px;height:38px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--white-06);border:1px solid var(--border)}
.stat-ic svg{width:17px;height:17px;stroke:var(--white-80);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.stat-val{font-family:'Rajdhani',sans-serif;font-size:1.3rem;font-weight:700;color:var(--white)}
.stat-lbl{font-size:.65rem;font-weight:300;color:var(--muted);letter-spacing:.1em;margin-top:2px}
