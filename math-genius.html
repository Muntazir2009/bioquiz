<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Genius — BioQuiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700;900&family=Barlow+Condensed:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
  onload="renderMath()"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060608;--surface:#0e0e12;--surface2:#161619;--surface3:#1e1e22;
  --white:#fff;--white80:rgba(255,255,255,.8);--white50:rgba(255,255,255,.5);
  --white20:rgba(255,255,255,.2);--white10:rgba(255,255,255,.1);--white06:rgba(255,255,255,.06);
  --border:rgba(255,255,255,.09);--border2:rgba(255,255,255,.18);
  --accent:#7c6efd;--accent2:#a78bfa;--accent-glow:rgba(124,110,253,.25);
  --green:#34d399;--red:#f87171;--amber:#fbbf24;--blue:#60a5fa;
  --font:'Rajdhani',sans-serif;--body:'Barlow Condensed',sans-serif;
  --radius:10px;
}
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg);color:var(--white80);
  font-family:var(--body);display:flex;flex-direction:column;
  -webkit-font-smoothing:antialiased;
}

/* ── TOPBAR ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 clamp(14px,3vw,40px);height:56px;flex-shrink:0;
  background:rgba(6,6,8,.95);border-bottom:1px solid var(--border);
  z-index:100;
}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none}
.brand-icon{
  width:30px;height:30px;border-radius:8px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;
}
.brand-name{font-family:var(--font);font-size:.7rem;font-weight:700;letter-spacing:.22em;color:var(--white)}
.brand-sep{width:1px;height:16px;background:var(--border);margin:0 6px}
.brand-sub{font-size:.6rem;letter-spacing:.14em;color:var(--white50)}
.topbar-right{display:flex;align-items:center;gap:8px}
.tb-chip{
  font-family:var(--font);font-size:.42rem;letter-spacing:.14em;font-weight:700;
  padding:5px 12px;border-radius:20px;border:1px solid var(--border);
  color:var(--white50);cursor:pointer;background:transparent;transition:all .2s;
  white-space:nowrap;
}
.tb-chip:hover{color:var(--white);border-color:var(--border2);background:var(--white06)}
.tb-chip.accent{border-color:rgba(124,110,253,.4);color:var(--accent2);background:rgba(124,110,253,.08)}
.tb-chip.accent:hover{background:rgba(124,110,253,.15)}
#themeBtn2{font-size:.9rem}
a.tb-chip{text-decoration:none}

/* ── MAIN LAYOUT ── */
.main{flex:1;display:flex;min-height:0;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{
  width:clamp(200px,22vw,280px);flex-shrink:0;
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
  background:var(--surface);
}
.sidebar-head{
  padding:16px 16px 10px;
  font-family:var(--font);font-size:.46rem;letter-spacing:.28em;font-weight:700;
  color:var(--white50);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.sidebar-new{
  background:none;border:1px solid var(--border);border-radius:6px;
  color:var(--white50);font-size:16px;line-height:1;cursor:pointer;
  padding:2px 8px;transition:all .2s;
}
.sidebar-new:hover{color:var(--white);border-color:var(--border2);background:var(--white06)}
.history-list{flex:1;overflow-y:auto;padding:8px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent}
.history-item{
  padding:9px 12px;border-radius:7px;cursor:pointer;
  font-size:.72rem;color:var(--white50);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  transition:background .15s,color .15s;margin-bottom:2px;
  border:1px solid transparent;
}
.history-item:hover{background:var(--white06);color:var(--white80);border-color:var(--border)}
.history-item.active{background:rgba(124,110,253,.1);color:var(--accent2);border-color:rgba(124,110,253,.25)}
.history-empty{padding:20px 16px;font-size:.68rem;color:var(--white20);text-align:center;font-style:italic}

/* Topics panel */
.topic-head{
  padding:10px 16px 8px;
  font-family:var(--font);font-size:.42rem;letter-spacing:.24em;font-weight:700;
  color:var(--white20);border-top:1px solid var(--border);flex-shrink:0;margin-top:auto;
}
.topic-pills{padding:0 10px 12px;display:flex;flex-wrap:wrap;gap:6px}
.topic-pill{
  font-size:.62rem;padding:4px 10px;border-radius:20px;
  border:1px solid var(--border);color:var(--white50);
  cursor:pointer;background:transparent;transition:all .18s;
  font-family:var(--body);
}
.topic-pill:hover{border-color:var(--accent);color:var(--accent2);background:rgba(124,110,253,.06)}

/* ── CHAT AREA ── */
.chat-wrap{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}

/* Messages */
.messages{
  flex:1;overflow-y:auto;padding:24px clamp(16px,4vw,60px);
  display:flex;flex-direction:column;gap:0;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent;
}
.msg{display:flex;gap:12px;margin-bottom:24px;animation:msgIn .3s cubic-bezier(.16,1,.3,1) both}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg-avatar{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:14px;
  margin-top:2px;
}
.msg.user .msg-avatar{background:var(--surface3);border:1px solid var(--border);order:2;margin-top:2px}
.msg.user{flex-direction:row-reverse}
.msg.user .msg-bubble{
  background:rgba(124,110,253,.14);border:1px solid rgba(124,110,253,.25);
  border-radius:18px 4px 18px 18px;
  align-items:flex-end;
}
.msg.ai .msg-avatar{background:linear-gradient(135deg,var(--accent),var(--accent2))}
.msg-bubble{
  max-width:min(720px,85%);display:flex;flex-direction:column;gap:0;
}
.msg.ai .msg-bubble{
  background:var(--surface);border:1px solid var(--border);
  border-radius:4px 18px 18px 18px;padding:16px 20px;
}
.msg.user .msg-bubble{padding:12px 18px}
.msg-label{
  font-family:var(--font);font-size:.36rem;letter-spacing:.18em;font-weight:700;
  color:var(--white20);margin-bottom:6px;
}
.msg-text{font-size:.92rem;line-height:1.76;color:var(--white80)}
.msg.user .msg-text{color:var(--white);font-size:.9rem}
.msg-text b,.msg-text strong{color:var(--white);font-weight:600}
.msg-text em{font-style:italic;font-family:Georgia,serif;color:var(--white80)}
.msg-text ul,.msg-text ol{padding-left:1.4em;margin:8px 0}
.msg-text li{margin-bottom:5px}
.msg-text code{
  font-family:'Courier New',monospace;font-size:.85em;
  background:var(--surface3);border:1px solid var(--border);
  padding:1px 6px;border-radius:4px;color:var(--green);
}
/* Equation block inside AI messages */
.eq-block{
  display:block;margin:12px 0;padding:14px 20px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.1);
  border-left:3px solid var(--accent);
  border-radius:0 6px 6px 0;
  font-family:Georgia,serif;font-size:1.05rem;font-style:italic;
  color:var(--white);text-align:center;overflow-x:auto;
}
.step-block{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;padding:14px 18px;margin:10px 0;
}
.step-block .step-n{
  font-family:var(--font);font-size:.38rem;letter-spacing:.2em;font-weight:700;
  color:var(--accent2);margin-bottom:6px;
}
/* KaTeX */
.katex{font-size:1.05em}
.katex-display{
  margin:12px 0;padding:12px 16px;
  background:rgba(255,255,255,.03);
  border:1px solid var(--border);border-radius:6px;overflow-x:auto;
}

/* Typing indicator */
.typing{display:flex;align-items:center;gap:4px;padding:14px 18px}
.typing-dot{width:7px;height:7px;border-radius:50%;background:var(--accent2);opacity:.4;animation:typDot 1.2s ease infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes typDot{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}

/* Welcome screen */
.welcome{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:32px 20px;text-align:center;
  gap:0;
}
.welcome-icon{font-size:3.5rem;margin-bottom:20px;line-height:1}
.welcome-title{
  font-family:var(--font);font-size:clamp(1.4rem,4vw,2.2rem);font-weight:900;
  letter-spacing:.02em;color:var(--white);margin-bottom:10px;
}
.welcome-sub{
  font-size:.9rem;color:var(--white50);line-height:1.7;max-width:480px;margin-bottom:32px;
}
.example-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-width:560px;width:100%;margin-bottom:8px}
.example-btn{
  padding:12px 16px;background:var(--surface);border:1px solid var(--border);
  border-radius:10px;cursor:pointer;text-align:left;transition:all .2s;
  font-family:var(--body);
}
.example-btn:hover{background:var(--surface2);border-color:var(--accent);box-shadow:0 0 20px var(--accent-glow)}
.example-btn .ex-label{font-size:.38rem;font-family:var(--font);letter-spacing:.2em;color:var(--accent2);margin-bottom:5px}
.example-btn .ex-text{font-size:.78rem;color:var(--white80);line-height:1.4}

/* ── INPUT BAR ── */
.input-bar{
  border-top:1px solid var(--border);padding:14px clamp(14px,4vw,60px) 16px;
  flex-shrink:0;background:var(--bg);
}
.input-wrap{
  display:flex;gap:10px;align-items:flex-end;
  max-width:860px;margin:0 auto;
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:10px 14px;
  transition:border-color .2s;
}
.input-wrap:focus-within{border-color:var(--accent)}
.input-textarea{
  flex:1;background:transparent;border:none;outline:none;resize:none;
  font-family:var(--body);font-size:.92rem;color:var(--white);
  line-height:1.5;max-height:160px;overflow-y:auto;
  scrollbar-width:thin;
  min-height:24px;
}
.input-textarea::placeholder{color:var(--white20)}
.input-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
.input-btn{
  width:36px;height:36px;border-radius:50%;background:transparent;
  border:1px solid var(--border);color:var(--white50);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s;font-size:14px;flex-shrink:0;
}
.input-btn:hover{background:var(--white06);border-color:var(--border2);color:var(--white)}
.send-btn{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;flex-shrink:0;
}
.send-btn:hover{transform:scale(1.08);box-shadow:0 4px 16px var(--accent-glow)}
.send-btn:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}
.send-btn svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.input-hint{
  text-align:center;font-size:.48rem;letter-spacing:.1em;color:var(--white20);
  margin-top:8px;
}

/* ── MODE CHIPS ── */
.mode-row{
  display:flex;gap:8px;max-width:860px;margin:0 auto 10px;
  overflow-x:auto;scrollbar-width:none;padding-bottom:2px;
}
.mode-row::-webkit-scrollbar{display:none}
.mode-chip{
  font-family:var(--font);font-size:.4rem;letter-spacing:.14em;font-weight:700;
  padding:5px 14px;border-radius:20px;border:1px solid var(--border);
  color:var(--white50);cursor:pointer;background:transparent;
  transition:all .18s;white-space:nowrap;flex-shrink:0;
}
.mode-chip:hover{color:var(--white);border-color:var(--border2)}
.mode-chip.on{border-color:var(--accent);color:var(--accent2);background:rgba(124,110,253,.1)}

/* Light theme */
body.theme-light{
  --bg:#f4f4f6;--surface:#fff;--surface2:#f0f0f4;--surface3:#e8e8f0;
  --white:#111;--white80:rgba(0,0,0,.8);--white50:rgba(0,0,0,.5);
  --white20:rgba(0,0,0,.2);--white10:rgba(0,0,0,.1);--white06:rgba(0,0,0,.06);
  --border:rgba(0,0,0,.1);--border2:rgba(0,0,0,.22);
  background:#f4f4f6;
}
body.theme-light .eq-block{background:rgba(0,0,0,.04);border-left-color:var(--accent);color:#111}
body.theme-light .katex-display{background:rgba(0,0,0,.03);border-color:rgba(0,0,0,.1)}
body.theme-light .msg.ai .msg-bubble{background:#fff;border-color:rgba(0,0,0,.1)}
body.theme-light .msg.user .msg-bubble{background:rgba(124,110,253,.1);border-color:rgba(124,110,253,.25)}
body.theme-light .input-wrap{background:#fff;border-color:rgba(0,0,0,.15)}
body.theme-light .topbar{background:rgba(244,244,246,.95)}
body.theme-light .sidebar{background:#f8f8fa}

/* Responsive */
@media(max-width:720px){
  .sidebar{display:none}
  .example-grid{grid-template-columns:1fr}
}
@media(max-width:480px){
  .input-bar{padding:10px 12px 12px}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <a href="index.html" class="brand">
    <div class="brand-icon">∑</div>
    <span class="brand-name">MATHGENIUS</span>
    <div class="brand-sep"></div>
    <span class="brand-sub">AI TUTOR</span>
  </a>
  <div class="topbar-right">
    <button class="tb-chip accent" onclick="newChat()">+ New</button>
    <button class="tb-chip" id="themeBtn2" onclick="toggleTheme()">☀</button>
    <a href="index.html" class="tb-chip">← HOME</a>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-head">
      HISTORY
      <button class="sidebar-new" onclick="newChat()" title="New chat">+</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="history-empty">No conversations yet</div>
    </div>
    <div class="topic-head">QUICK TOPICS</div>
    <div class="topic-pills">
      <button class="topic-pill" onclick="askTopic('Quadratic equations')">Quadratics</button>
      <button class="topic-pill" onclick="askTopic('Derivatives and differentiation')">Calculus</button>
      <button class="topic-pill" onclick="askTopic('Matrix multiplication')">Matrices</button>
      <button class="topic-pill" onclick="askTopic('Trigonometric identities')">Trig</button>
      <button class="topic-pill" onclick="askTopic('Integration by parts')">Integration</button>
      <button class="topic-pill" onclick="askTopic('Statistics and probability')">Stats</button>
      <button class="topic-pill" onclick="askTopic('Complex numbers')">Complex</button>
      <button class="topic-pill" onclick="askTopic('Vector algebra')">Vectors</button>
      <button class="topic-pill" onclick="askTopic('Logarithms and exponentials')">Logs</button>
      <button class="topic-pill" onclick="askTopic('Number theory basics')">Number Theory</button>
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat-wrap">
    <div class="messages" id="messages">
      <!-- Welcome shown when no messages -->
      <div class="welcome" id="welcome">
        <div class="welcome-icon">𝛴</div>
        <div class="welcome-title">MATH GENIUS</div>
        <div class="welcome-sub">
          Ask anything — algebra, calculus, geometry, stats, proofs.
          I show full working, render equations clearly, and explain every step.
        </div>
        <div class="example-grid">
          <button class="example-btn" onclick="useExample('Solve x² - 5x + 6 = 0 step by step')">
            <div class="ex-label">ALGEBRA</div>
            <div class="ex-text">Solve x² − 5x + 6 = 0 step by step</div>
          </button>
          <button class="example-btn" onclick="useExample('Differentiate f(x) = x³ sin(x) using the product rule')">
            <div class="ex-label">CALCULUS</div>
            <div class="ex-text">Differentiate f(x) = x³ sin(x)</div>
          </button>
          <button class="example-btn" onclick="useExample('Prove that the sum of angles in a triangle is 180°')">
            <div class="ex-label">GEOMETRY</div>
            <div class="ex-text">Prove sum of triangle angles = 180°</div>
          </button>
          <button class="example-btn" onclick="useExample('Explain Bayes theorem with a real example')">
            <div class="ex-label">PROBABILITY</div>
            <div class="ex-text">Explain Bayes' Theorem with an example</div>
          </button>
        </div>
      </div>
    </div>

    <!-- Mode chips -->
    <div class="input-bar">
      <div class="mode-row" id="modeRow">
        <button class="mode-chip on" data-m="tutor"    onclick="setMode(this)">📚 TUTOR</button>
        <button class="mode-chip"    data-m="solve"    onclick="setMode(this)">⚡ SOLVE</button>
        <button class="mode-chip"    data-m="explain"  onclick="setMode(this)">💡 EXPLAIN</button>
        <button class="mode-chip"    data-m="quiz"     onclick="setMode(this)">🎯 QUIZ ME</button>
        <button class="mode-chip"    data-m="proof"    onclick="setMode(this)">📐 PROOF</button>
        <button class="mode-chip"    data-m="graph"    onclick="setMode(this)">📈 GRAPH</button>
      </div>
      <div class="input-wrap">
        <textarea
          class="input-textarea"
          id="userInput"
          placeholder="Ask a math question… e.g. Solve 2x + 5 = 13"
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <div class="input-actions">
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg>
          </button>
        </div>
      </div>
      <div class="input-hint">Enter to send · Shift+Enter for new line · Equations rendered with KaTeX</div>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════
   STATE
══════════════════════════════════ */
var API_URL = 'https://ask-ai.killermunu.workers.dev';
var _mode = 'tutor';
var _history = []; // current conversation [{role,content}]
var _sessions = JSON.parse(localStorage.getItem('mg_sessions') || '[]');
var _curSession = null;
var _thinking = false;

/* ══════════════════════════════════
   THEME
══════════════════════════════════ */
var _theme = localStorage.getItem('mg_theme') || 'dark';
function applyTheme(t){
  _theme=t;
  document.body.classList.toggle('theme-light', t==='light');
  localStorage.setItem('mg_theme',t);
  document.getElementById('themeBtn2').textContent = t==='light' ? '🌙' : '☀';
}
applyTheme(_theme);
function toggleTheme(){ applyTheme(_theme==='dark'?'light':'dark'); }

/* ══════════════════════════════════
   MODE
══════════════════════════════════ */
function setMode(btn){
  document.querySelectorAll('.mode-chip').forEach(function(c){c.classList.remove('on');});
  btn.classList.add('on');
  _mode = btn.dataset.m;
  var inp = document.getElementById('userInput');
  var hints = {
    tutor:   'Ask anything to learn with explanations…',
    solve:   'Enter a problem to solve with full working…',
    explain:  'Enter a concept to get a clear explanation…',
    quiz:    'Enter a topic and I\'ll quiz you…',
    proof:   'Enter a statement to prove step by step…',
    graph:   'Describe a function or equation to analyse…',
  };
  inp.placeholder = hints[_mode] || 'Ask a math question…';
}

/* ══════════════════════════════════
   BUILD SYSTEM PROMPT
══════════════════════════════════ */
function buildSystem(){
  var base =
    'You are MathGenius — an expert mathematics tutor and solver. ' +
    'You handle all levels: arithmetic, algebra, geometry, trigonometry, calculus (differential & integral), ' +
    'linear algebra, statistics, probability, discrete math, number theory, complex analysis, and proofs. ' +
    '\n\nFORMATTING RULES (follow exactly):\n' +
    '• Wrap ALL inline math in \\( ... \\) — e.g. "the formula is \\(E = mc^2\\)"\n' +
    '• Wrap ALL display/block equations in \\[ ... \\] on their own line\n' +
    '• Use proper LaTeX: \\frac{a}{b} for fractions, \\sqrt{x} for roots, x^{n} for powers, x_{i} for subscripts\n' +
    '• For long derivations, number each step: "**Step 1:** ...  **Step 2:** ..."\n' +
    '• Wrap worked examples in <div class="eq-block">...</div>\n' +
    '• Use <strong> for key terms, <em> for written-out formulas not in KaTeX\n' +
    '• End every response with a "Key Takeaway" in bold.\n' +
    '• Always check your arithmetic — be precise.\n';

  var modes = {
    tutor:  'MODE: TUTOR — teach the concept from first principles, then solve with explanation.',
    solve:  'MODE: SOLVE — solve the problem completely showing every algebraic step. State the answer clearly.',
    explain:'MODE: EXPLAIN — explain the concept visually with analogies, then show the math.',
    quiz:   'MODE: QUIZ — give 3 practice problems of increasing difficulty on the topic. After user answers, grade and explain.',
    proof:  'MODE: PROOF — write a formal proof with axioms/theorems cited. Be rigorous.',
    graph:  'MODE: GRAPH — describe the function behaviour: domain, range, intercepts, asymptotes, maxima/minima, inflection points. Give a table of values.',
  };

  return base + '\n' + (modes[_mode] || modes.tutor);
}

/* ══════════════════════════════════
   RENDER MATH
══════════════════════════════════ */
function renderMath(){
  if(typeof renderMathInElement==='undefined') return;
  var msgs = document.getElementById('messages');
  renderMathInElement(msgs, {
    delimiters:[
      {left:'\\[',right:'\\]',display:true},
      {left:'\\(',right:'\\)',display:false},
      {left:'$$',right:'$$',display:true},
      {left:'$',right:'$',display:false},
    ],
    throwOnError:false,
    errorColor:'#f87171',
  });
}

/* ══════════════════════════════════
   SEND MESSAGE
══════════════════════════════════ */
async function sendMessage(){
  if(_thinking) return;
  var inp = document.getElementById('userInput');
  var text = inp.value.trim();
  if(!text) return;

  // Hide welcome
  var welcome = document.getElementById('welcome');
  if(welcome){ welcome.remove(); }

  inp.value=''; autoResize(inp);
  addMessage('user', text);
  _history.push({role:'user', content:text});

  showTyping();
  _thinking=true;
  document.getElementById('sendBtn').disabled=true;

  try {
    // Build full messages array for context
    var messages = _history.map(function(m){
      return {role: m.role === 'ai' ? 'assistant' : m.role, content: m.content};
    });

    var systemPrompt = buildSystem();
    var fullPrompt = systemPrompt + '\n\nConversation:\n' +
      _history.slice(0,-1).map(function(m){
        return (m.role==='user' ? 'User: ' : 'Assistant: ') + m.content;
      }).join('\n') +
      '\nUser: ' + text +
      '\nAssistant:';

    var r = await fetch(API_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({query: fullPrompt})
    });
    if(!r.ok) throw new Error('HTTP '+r.status);
    var j = await r.json();
    var reply = j.answer || j.response || j.content || j.text || j.result || '';
    if(!reply) throw new Error('Empty response');

    removeTyping();
    _thinking=false;
    document.getElementById('sendBtn').disabled=false;

    addMessage('ai', reply);
    _history.push({role:'ai', content:reply});
    saveSession(text);

  } catch(e) {
    removeTyping();
    _thinking=false;
    document.getElementById('sendBtn').disabled=false;
    addMessage('ai', '<span style="color:#f87171">⚠ Error: '+e.message+'. Please try again.</span>');
  }
}

/* ══════════════════════════════════
   ADD MESSAGE TO DOM
══════════════════════════════════ */
function addMessage(role, content){
  var msgs = document.getElementById('messages');
  var div = document.createElement('div');
  div.className = 'msg ' + role;

  var avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role==='user' ? '👤' : '∑';

  var bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  if(role==='ai'){
    var label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = 'MATHGENIUS';
    bubble.appendChild(label);
  }

  var text = document.createElement('div');
  text.className = 'msg-text';
  text.innerHTML = formatContent(content);
  bubble.appendChild(text);

  div.appendChild(avatar);
  div.appendChild(bubble);
  msgs.appendChild(div);

  // Scroll to bottom
  msgs.scrollTop = msgs.scrollHeight;

  // Render math in this message
  setTimeout(function(){
    if(typeof renderMathInElement!=='undefined'){
      renderMathInElement(text, {
        delimiters:[
          {left:'\\[',right:'\\]',display:true},
          {left:'\\(',right:'\\)',display:false},
          {left:'$$',right:'$$',display:true},
          {left:'$',right:'$',display:false},
        ],
        throwOnError:false,
        errorColor:'#f87171',
      });
    }
    msgs.scrollTop = msgs.scrollHeight;
  }, 50);
}

/* ══════════════════════════════════
   FORMAT CONTENT (Markdown-lite)
══════════════════════════════════ */
function formatContent(text){
  // Bold **text**
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic *text*
  text = text.replace(/\*([^*]+?)\*/g, '<em>$1</em>');
  // Code `text`
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Headings ### text
  text = text.replace(/^### (.+)$/gm, '<strong style="font-size:1rem;display:block;margin:12px 0 6px;color:var(--white)">$1</strong>');
  text = text.replace(/^## (.+)$/gm, '<strong style="font-size:1.05rem;display:block;margin:14px 0 7px;color:var(--white)">$1</strong>');
  // Bullet lists
  text = text.replace(/^\s*[-•]\s+(.+)$/gm, '<li>$1</li>');
  text = text.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
  // Numbered lists
  text = text.replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>');
  // Line breaks
  text = text.replace(/\n\n/g, '</p><p style="margin-top:10px">');
  text = text.replace(/\n/g, '<br>');
  if(!text.startsWith('<')) text = '<p>'+text+'</p>';
  return text;
}

/* ══════════════════════════════════
   TYPING INDICATOR
══════════════════════════════════ */
function showTyping(){
  var msgs = document.getElementById('messages');
  var div = document.createElement('div');
  div.className='msg ai'; div.id='typing-msg';
  div.innerHTML=
    '<div class="msg-avatar">∑</div>'+
    '<div class="msg-bubble" style="padding:14px 18px">'+
      '<div class="typing">'+
        '<div class="typing-dot"></div>'+
        '<div class="typing-dot"></div>'+
        '<div class="typing-dot"></div>'+
      '</div>'+
    '</div>';
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
}
function removeTyping(){
  var t=document.getElementById('typing-msg');
  if(t) t.remove();
}

/* ══════════════════════════════════
   SESSION HISTORY
══════════════════════════════════ */
function saveSession(firstMsg){
  if(!_curSession){
    _curSession = {id: Date.now(), title: firstMsg.slice(0,48), messages: []};
    _sessions.unshift(_curSession);
  }
  _curSession.messages = _history.slice();
  localStorage.setItem('mg_sessions', JSON.stringify(_sessions.slice(0,30)));
  renderHistory();
}

function renderHistory(){
  var list = document.getElementById('historyList');
  if(!_sessions.length){
    list.innerHTML='<div class="history-empty">No conversations yet</div>';
    return;
  }
  list.innerHTML = _sessions.map(function(s){
    var active = _curSession && _curSession.id===s.id ? ' active' : '';
    return '<div class="history-item'+active+'" onclick="loadSession('+s.id+')" title="'+escHtml(s.title)+'">'+escHtml(s.title.slice(0,38))+'</div>';
  }).join('');
}

function loadSession(id){
  var s = _sessions.find(function(x){return x.id===id;});
  if(!s) return;
  _curSession = s;
  _history = s.messages.slice();
  var msgs = document.getElementById('messages');
  msgs.innerHTML='';
  _history.forEach(function(m){ addMessage(m.role, m.content); });
  renderHistory();
}

function newChat(){
  _history=[];_curSession=null;
  var msgs = document.getElementById('messages');
  msgs.innerHTML='';
  // Re-add welcome
  var w = document.createElement('div');
  w.className='welcome';w.id='welcome';
  w.innerHTML=
    '<div class="welcome-icon">𝛴</div>'+
    '<div class="welcome-title">MATH GENIUS</div>'+
    '<div class="welcome-sub">Ask anything — algebra, calculus, geometry, stats, proofs.<br>I show full working, render equations clearly, and explain every step.</div>'+
    '<div class="example-grid">'+
      '<button class="example-btn" onclick="useExample(\'Solve x² - 5x + 6 = 0 step by step\')"><div class="ex-label">ALGEBRA</div><div class="ex-text">Solve x² − 5x + 6 = 0</div></button>'+
      '<button class="example-btn" onclick="useExample(\'Differentiate f(x) = x³ sin(x)\')"><div class="ex-label">CALCULUS</div><div class="ex-text">Differentiate x³ sin(x)</div></button>'+
      '<button class="example-btn" onclick="useExample(\'Prove sum of triangle angles = 180°\')"><div class="ex-label">GEOMETRY</div><div class="ex-text">Prove sum of angles = 180°</div></button>'+
      '<button class="example-btn" onclick="useExample(\'Explain Bayes theorem with example\')"><div class="ex-label">PROBABILITY</div><div class="ex-text">Bayes\' Theorem explained</div></button>'+
    '</div>';
  msgs.appendChild(w);
  renderHistory();
}

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ══════════════════════════════════
   HELPERS
══════════════════════════════════ */
function useExample(txt){ document.getElementById('userInput').value=txt; sendMessage(); }
function askTopic(t){ document.getElementById('userInput').value='Teach me: '+t; sendMessage(); }

function handleKey(e){
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); }
}
function autoResize(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,160)+'px';
}

// Init
renderHistory();
</script>
