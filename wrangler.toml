#:schema node_modules/wrangler/config-schema.json

name = "bioquiz"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# ── D1 Database ──────────────────────────────────────
# Run: wrangler d1 create bioquiz-db
# Then paste the database_id below
[[d1_databases]]
binding = "DB"
database_name = "bioquiz-db"
database_id = "YOUR_D1_DATABASE_ID"

# ── R2 Storage ──────────────────────────────────────
# Run: wrangler r2 bucket create bioquiz-uploads
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "bioquiz-uploads"
