<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ask</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   RESET & ROOT
   ═══════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:            #000000;
  --surface:       #0a0a0a;
  --card:          #141414;
  --card-hover:    #1a1a1a;
  --border:        rgba(255,255,255,.08);
  --border-active: rgba(255,255,255,.18);
  --text:          #f5f5f7;
  --text-secondary:rgba(245,245,247,.55);
  --text-muted:    rgba(245,245,247,.3);
  --accent:        #ffffff;
  --accent-dim:    rgba(255,255,255,.65);
  --glass:         rgba(28,28,30,.72);
  --glass-border:  rgba(255,255,255,.1);
  --glass-blur:    40px;
  --radius-sm:     10px;
  --radius-md:     14px;
  --radius-lg:     20px;
  --radius-xl:     24px;
  --shadow-sm:     0 2px 8px rgba(0,0,0,.3);
  --shadow-md:     0 8px 32px rgba(0,0,0,.4);
  --shadow-lg:     0 20px 60px rgba(0,0,0,.5);
  --transition:    .35s cubic-bezier(.25,.1,.25,1);
  --transition-spring: .5s cubic-bezier(.34,1.56,.64,1);
  --font:          -apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Display', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  --font-mono:     'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
}

html,body{
  height:100%;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font);
  display:flex;
  flex-direction:column;
}

/* ═══════════════════════════════════════
   READING PROGRESS BAR
   ═══════════════════════════════════════ */
#progressBar{
  position:fixed;
  top:0;left:0;
  height:2px;
  background:rgba(255,255,255,.6);
  z-index:9999;
  width:0%;
  transition:width .15s linear;
  pointer-events:none;
}

/* ═══════════════════════════════════════
   AMBIENT BACKGROUND
   ═══════════════════════════════════════ */
.ambient{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  overflow:hidden;
}
.ambient-orb{
  position:absolute;
  border-radius:50%;
  filter:blur(100px);
  opacity:.04;
  will-change:transform;
}
.ambient-orb:nth-child(1){
  width:600px;height:600px;
  background:#fff;
  top:-200px;left:-100px;
}
.ambient-orb:nth-child(2){
  width:500px;height:500px;
  background:#fff;
  bottom:-150px;right:-100px;
}
.ambient-orb:nth-child(3){
  width:400px;height:400px;
  background:#888;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
}

/* ═══════════════════════════════════════
   MAIN SHELL
   ═══════════════════════════════════════ */
.shell{
  position:relative;z-index:1;
  height:100vh;
  height:100dvh;
  display:flex;
  flex-direction:column;
  max-width:780px;
  margin:0 auto;
  width:100%;
  padding:0 20px;
}

/* ═══════════════════════════════════════
   TOP BAR
   ═══════════════════════════════════════ */
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:16px 0;
  flex-shrink:0;
  animation:slideDown .6s var(--transition-spring) both;
}
@keyframes slideDown{
  from{opacity:0;transform:translateY(-12px)}
  to{opacity:1;transform:translateY(0)}
}

.tb-left{display:flex;align-items:center;gap:16px}
.tb-right{display:flex;align-items:center;gap:12px}

.brand{
  font-size:1.1rem;
  font-weight:700;
  letter-spacing:-.02em;
  color:var(--text);
}

.icon-btn{
  width:36px;height:36px;
  display:flex;align-items:center;justify-content:center;
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  background:var(--glass);
  backdrop-filter:blur(var(--glass-blur));
  -webkit-backdrop-filter:blur(var(--glass-blur));
  color:var(--text-secondary);
  cursor:pointer;
  transition:all var(--transition);
  outline:none;
  padding:0;
  font-size:0;
}
.icon-btn:hover{
  background:rgba(255,255,255,.08);
  color:var(--text);
  border-color:var(--border-active);
}
.icon-btn:active{
  transform:scale(.92);
}
.icon-btn svg{width:16px;height:16px;pointer-events:none}

.status-dot{
  width:6px;height:6px;
  border-radius:50%;
  background:#30d158;
  box-shadow:0 0 8px rgba(48,209,88,.5);
}

#clock{
  font-size:.75rem;
  font-weight:500;
  color:var(--text-muted);
  font-variant-numeric:tabular-nums;
  letter-spacing:.02em;
}

/* ═══════════════════════════════════════
   MAIN PANEL
   ═══════════════════════════════════════ */
.panel{
  flex:1;
  display:flex;
  flex-direction:column;
  margin-bottom:20px;
  border-radius:var(--radius-xl);
  overflow:hidden;
  border:1px solid var(--border);
  background:var(--glass);
  backdrop-filter:blur(var(--glass-blur));
  -webkit-backdrop-filter:blur(var(--glass-blur));
  box-shadow:var(--shadow-lg), inset 0 1px 0 rgba(255,255,255,.05);
  animation:panelIn .7s var(--transition-spring) .1s both;
}
@keyframes panelIn{
  from{opacity:0;transform:translateY(20px) scale(.98)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

/* ── INPUT AREA ── */
.input-area{
  padding:20px 24px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  transition:background var(--transition);
}
.input-area:focus-within{
  background:rgba(255,255,255,.02);
}

.input-wrapper{
  display:flex;
  align-items:center;
  gap:12px;
}

.prompt-char{
  color:var(--text-muted);
  font-size:1.2rem;
  font-weight:300;
  flex-shrink:0;
  user-select:none;
  transition:color var(--transition);
}
.input-area:focus-within .prompt-char{
  color:var(--accent-dim);
}

#query{
  flex:1;
  background:transparent;
  border:none;
  outline:none;
  color:var(--text);
  font-family:var(--font);
  font-size:1rem;
  font-weight:400;
  padding:4px 0;
  letter-spacing:-.01em;
}
#query::placeholder{
  color:var(--text-muted);
  font-weight:300;
}

/* ── VOICE BUTTON ── */
.voice-btn{
  width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;
  border:none;
  border-radius:50%;
  background:transparent;
  color:var(--text-muted);
  cursor:pointer;
  transition:all var(--transition);
  flex-shrink:0;
  padding:0;
  font-size:0;
}
.voice-btn:hover{
  color:var(--text);
  background:rgba(255,255,255,.06);
}
.voice-btn.listening{
  color:#ff3b30;
  animation:pulse-ring 1.5s ease infinite;
}
@keyframes pulse-ring{
  0%,100%{box-shadow:0 0 0 0 rgba(255,59,48,.3)}
  50%{box-shadow:0 0 0 8px rgba(255,59,48,0)}
}
.voice-btn svg{width:18px;height:18px}

/* ── CONTROLS ── */
.controls{
  display:flex;
  gap:8px;
  padding:12px 24px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  flex-wrap:wrap;
}

.btn{
  font-family:var(--font);
  font-size:.78rem;
  font-weight:600;
  letter-spacing:.01em;
  padding:8px 18px;
  border-radius:var(--radius-sm);
  background:rgba(255,255,255,.04);
  cursor:pointer;
  border:1px solid var(--border);
  color:var(--accent-dim);
  transition:all var(--transition);
  outline:none;
  position:relative;
  overflow:hidden;
}
.btn::after{
  content:'';
  position:absolute;inset:0;
  background:rgba(255,255,255,0);
  transition:background var(--transition);
}
.btn:hover::after{
  background:rgba(255,255,255,.04);
}
.btn:hover{
  border-color:var(--border-active);
  transform:translateY(-1px);
  box-shadow:0 4px 12px rgba(0,0,0,.2);
}
.btn:active{
  transform:scale(.96);
}
.btn:disabled{
  opacity:.3;
  cursor:not-allowed;
  transform:none!important;
  box-shadow:none!important;
}
.btn:disabled::after{display:none}

.btn-primary{
  background:rgba(255,255,255,.9);
  color:#000;
  border-color:transparent;
}
.btn-primary:hover{
  background:#fff;
  border-color:transparent;
  box-shadow:0 4px 16px rgba(255,255,255,.15);
}
.btn-primary::after{display:none}

.btn-secondary{
  background:rgba(255,255,255,.06);
  color:var(--text);
  border-color:rgba(255,255,255,.12);
}
.btn-secondary:hover{
  background:rgba(255,255,255,.1);
}

.btn-danger{
  color:rgba(255,59,48,.8);
  border-color:rgba(255,59,48,.2);
}
.btn-danger:hover{
  background:rgba(255,59,48,.08);
  border-color:rgba(255,59,48,.35);
}

.btn-icon{
  padding:0;
  width:34px;height:34px;
  display:inline-flex;
  align-items:center;justify-content:center;
  border-radius:var(--radius-sm);
}
.btn-icon svg{width:15px;height:15px}

/* ── SHORTCUT HINT ── */
.shortcut-hint{
  font-size:.6rem;
  color:var(--text-muted);
  padding:0 24px 10px;
  display:flex;
  align-items:center;
  gap:6px;
  flex-shrink:0;
}
.kbd{
  display:inline-flex;
  align-items:center;
  padding:2px 6px;
  border-radius:4px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--border);
  font-family:var(--font-mono);
  font-size:.6rem;
  color:var(--text-muted);
}

/* ═══════════════════════════════════════
   RESULT AREA
   ═══════════════════════════════════════ */
#result{
  flex:1;
  padding:24px;
  overflow-y:auto;
  overflow-x:hidden;
  font-size:.94rem;
  line-height:1.75;
  color:var(--text-secondary);
}
#result::-webkit-scrollbar{width:4px}
#result::-webkit-scrollbar-track{background:transparent}
#result::-webkit-scrollbar-thumb{
  background:rgba(255,255,255,.12);
  border-radius:4px;
}
#result::-webkit-scrollbar-thumb:hover{
  background:rgba(255,255,255,.22);
}

/* ── RESULT ENTRANCE ANIMATION ── */
.result-enter{
  animation:resultIn .5s var(--transition) both;
}
@keyframes resultIn{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}

/* ── TYPOGRAPHY ── */
#result h2{
  font-size:1.3rem;
  font-weight:700;
  letter-spacing:-.03em;
  color:var(--text);
  margin-bottom:12px;
  line-height:1.3;
}
#result p{
  margin-bottom:14px;
  color:var(--text-secondary);
  line-height:1.8;
}
#result img{
  max-width:100%;
  border-radius:var(--radius-md);
  margin:16px 0;
  display:block;
  border:1px solid var(--border);
  box-shadow:var(--shadow-md);
  cursor:pointer;
  transition:transform var(--transition), box-shadow var(--transition);
}
#result img:hover{
  transform:scale(1.01);
  box-shadow:var(--shadow-lg);
}

/* ── META ── */
.meta{
  font-size:.72rem;
  font-weight:500;
  color:var(--text-muted);
  margin-top:12px;
  display:flex;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}
.meta-item{
  display:inline-flex;
  align-items:center;
  gap:5px;
}
.meta-dot{
  width:3px;height:3px;
  border-radius:50%;
  background:var(--text-muted);
}

/* ── ACTION BAR ── */
.action-bar{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-top:16px;
  padding-top:16px;
  border-top:1px solid var(--border);
}
.action-bar .btn{
  font-size:.72rem;
  padding:7px 14px;
}

/* ── AI BLOCK ── */
.ai-block{
  margin-top:20px;
  border:1px solid var(--border);
  border-radius:var(--radius-md);
  overflow:hidden;
  background:rgba(255,255,255,.015);
}
.ai-label{
  font-size:.7rem;
  font-weight:600;
  letter-spacing:.04em;
  text-transform:uppercase;
  color:var(--accent-dim);
  padding:10px 16px;
  background:rgba(255,255,255,.03);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  gap:8px;
}
.ai-label-dot{
  width:5px;height:5px;
  border-radius:50%;
  background:#fff;
  animation:dot-blink 1.4s ease infinite;
}
@keyframes dot-blink{0%,100%{opacity:1}50%{opacity:.25}}

.ai-text{
  padding:18px 20px;
  font-size:.92rem;
  line-height:1.85;
  color:var(--text-secondary);
  white-space:pre-wrap;
  word-break:break-word;
}

/* Markdown in AI text */
.ai-text strong{color:var(--text);font-weight:600}
.ai-text em{font-style:italic;color:var(--accent-dim)}
.ai-text code{
  font-family:var(--font-mono);
  font-size:.84em;
  padding:2px 6px;
  border-radius:5px;
  background:rgba(255,255,255,.06);
  color:var(--accent-dim);
}
.ai-text ul,.ai-text ol{
  padding-left:20px;
  margin:8px 0;
}
.ai-text li{margin-bottom:4px}

.ai-cursor{
  display:inline-block;
  width:2px;
  height:.95em;
  background:var(--accent-dim);
  margin-left:2px;
  vertical-align:middle;
  animation:cursor-blink .7s steps(1) infinite;
}
@keyframes cursor-blink{0%,100%{opacity:1}50%{opacity:0}}

/* ── COMPARE BLOCK ── */
.compare-block{
  margin-top:20px;
  border:1px solid var(--border);
  border-radius:var(--radius-md);
  overflow:hidden;
  background:rgba(255,255,255,.015);
}

/* ── LOADING ── */
.loading-state{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:48px 24px;
  gap:16px;
  color:var(--text-muted);
}
.loading-spinner{
  width:24px;height:24px;
  border:2px solid var(--border);
  border-top-color:var(--accent-dim);
  border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{
  font-size:.8rem;
  font-weight:500;
  letter-spacing:.03em;
}

/* ═══════════════════════════════════════
   SUGGESTIONS (EMPTY STATE)
   ═══════════════════════════════════════ */
.suggestions{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:32px 24px;
  gap:24px;
  animation:fadeIn .6s var(--transition) both;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.suggestions-title{
  font-size:1.5rem;
  font-weight:700;
  letter-spacing:-.04em;
  color:var(--text);
  text-align:center;
  line-height:1.2;
}

.suggestions-sub{
  font-size:.88rem;
  color:var(--text-muted);
  text-align:center;
  max-width:360px;
  line-height:1.5;
}

.chip-row{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:8px;
  margin-top:4px;
}

.chip{
  padding:8px 16px;
  border-radius:100px;
  border:1px solid var(--border);
  background:rgba(255,255,255,.02);
  color:var(--text-secondary);
  font-size:.78rem;
  font-weight:500;
  cursor:pointer;
  transition:all var(--transition);
  font-family:var(--font);
}
.chip:hover{
  background:rgba(255,255,255,.07);
  border-color:var(--border-active);
  color:var(--text);
  transform:translateY(-1px);
}
.chip:active{transform:scale(.96)}

/* ═══════════════════════════════════════
   HISTORY SIDEBAR
   ═══════════════════════════════════════ */
.sidebar-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.5);
  z-index:100;
  opacity:0;
  pointer-events:none;
  transition:opacity var(--transition);
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
}
.sidebar-overlay.open{
  opacity:1;
  pointer-events:auto;
}

.sidebar{
  position:fixed;
  top:0;right:0;
  width:340px;
  max-width:85vw;
  height:100%;
  height:100dvh;
  background:var(--surface);
  border-left:1px solid var(--border);
  z-index:101;
  transform:translateX(100%);
  transition:transform .4s cubic-bezier(.32,.72,0,1);
  display:flex;
  flex-direction:column;
}
.sidebar.open{
  transform:translateX(0);
}

.sidebar-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:20px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}

.sidebar-title{
  font-size:.9rem;
  font-weight:600;
  color:var(--text);
  letter-spacing:-.01em;
}

.sidebar-body{
  flex:1;
  overflow-y:auto;
  padding:12px;
}
.sidebar-body::-webkit-scrollbar{width:3px}
.sidebar-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}

.history-item{
  padding:12px 14px;
  border-radius:var(--radius-sm);
  cursor:pointer;
  transition:background var(--transition);
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:4px;
}
.history-item:hover{
  background:rgba(255,255,255,.04);
}

.history-icon{
  width:28px;height:28px;
  border-radius:6px;
  background:rgba(255,255,255,.04);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  color:var(--text-muted);
}
.history-icon svg{width:13px;height:13px}

.history-text{
  font-size:.82rem;
  color:var(--text-secondary);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  flex:1;
}

.history-time{
  font-size:.65rem;
  color:var(--text-muted);
  flex-shrink:0;
}

.sidebar-empty{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:48px 24px;
  color:var(--text-muted);
  font-size:.82rem;
  text-align:center;
  gap:8px;
}

/* ── BOOKMARKS ── */
.sidebar-tabs{
  display:flex;
  gap:2px;
  padding:12px 12px 0;
  flex-shrink:0;
}
.sidebar-tab{
  flex:1;
  padding:8px;
  border:none;
  background:transparent;
  color:var(--text-muted);
  font-size:.75rem;
  font-weight:600;
  cursor:pointer;
  border-radius:var(--radius-sm) var(--radius-sm) 0 0;
  transition:all var(--transition);
  font-family:var(--font);
  border-bottom:2px solid transparent;
}
.sidebar-tab.active{
  color:var(--text);
  background:rgba(255,255,255,.04);
  border-bottom-color:var(--accent-dim);
}

/* ═══════════════════════════════════════
   TOAST
   ═══════════════════════════════════════ */
.toast-container{
  position:fixed;
  bottom:24px;
  left:50%;
  transform:translateX(-50%);
  z-index:200;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
  pointer-events:none;
}

.toast{
  padding:10px 20px;
  border-radius:100px;
  background:rgba(50,50,50,.9);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.08);
  color:var(--text);
  font-size:.8rem;
  font-weight:500;
  animation:toastIn .35s var(--transition-spring) both;
  display:flex;
  align-items:center;
  gap:8px;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
}
.toast.out{
  animation:toastOut .3s ease both;
}
@keyframes toastIn{
  from{opacity:0;transform:translateY(12px) scale(.9)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes toastOut{
  to{opacity:0;transform:translateY(8px) scale(.9)}
}
.toast-icon{width:14px;height:14px;flex-shrink:0}

/* ═══════════════════════════════════════
   IMAGE LIGHTBOX
   ═══════════════════════════════════════ */
.lightbox{
  position:fixed;inset:0;
  z-index:150;
  background:rgba(0,0,0,.85);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:opacity .3s ease;
  cursor:pointer;
}
.lightbox.open{
  opacity:1;
  pointer-events:auto;
}
.lightbox img{
  max-width:90vw;
  max-height:85vh;
  border-radius:var(--radius-md);
  box-shadow:var(--shadow-lg);
  transition:transform .4s var(--transition-spring);
}
.lightbox.open img{
  transform:scale(1);
}

/* ═══════════════════════════════════════
   COMMAND PALETTE (CMD+K)
   ═══════════════════════════════════════ */
.command-palette-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  z-index:120;
  opacity:0;
  pointer-events:none;
  transition:opacity .2s ease;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding-top:min(20vh,180px);
}
.command-palette-overlay.open{
  opacity:1;
  pointer-events:auto;
}

.command-palette{
  width:480px;
  max-width:90vw;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-lg);
  overflow:hidden;
  transform:scale(.95) translateY(-8px);
  transition:transform .25s cubic-bezier(.32,.72,0,1);
}
.command-palette-overlay.open .command-palette{
  transform:scale(1) translateY(0);
}

.command-palette-input{
  width:100%;
  padding:16px 20px;
  background:transparent;
  border:none;
  border-bottom:1px solid var(--border);
  outline:none;
  color:var(--text);
  font-family:var(--font);
  font-size:1rem;
}
.command-palette-input::placeholder{color:var(--text-muted)}

.command-palette-list{
  max-height:280px;
  overflow-y:auto;
  padding:6px;
}
.command-palette-list::-webkit-scrollbar{width:3px}
.command-palette-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}

.command-item{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 12px;
  border-radius:var(--radius-sm);
  cursor:pointer;
  transition:background .15s ease;
}
.command-item:hover,.command-item.active{
  background:rgba(255,255,255,.06);
}

.command-item-label{
  font-size:.85rem;
  color:var(--text-secondary);
}
.command-item-shortcut{
  margin-left:auto;
  font-size:.65rem;
  color:var(--text-muted);
}

/* ═══════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════ */
@media(max-width:600px){
  .shell{padding:0 12px}
  .controls{gap:6px;padding:10px 16px}
  .btn{padding:7px 14px;font-size:.72rem}
  .input-area{padding:16px}
  #result{padding:18px 16px}
  .suggestions{padding:24px 16px}
  .suggestions-title{font-size:1.2rem}
  .shortcut-hint{display:none}
  .action-bar .btn{font-size:.68rem;padding:6px 12px}
}

/* ═══════════════════════════════════════
   FOCUS VISIBLE
   ═══════════════════════════════════════ */
:focus-visible{
  outline:2px solid rgba(255,255,255,.4);
  outline-offset:2px;
}
button:focus:not(:focus-visible),
input:focus:not(:focus-visible){
  outline:none;
}

/* ═══════════════════════════════════════
   SELECTION
   ═══════════════════════════════════════ */
::selection{
  background:rgba(255,255,255,.18);
  color:#fff;
}
</style>
</head>
<body>

<!-- Progress Bar -->
<div id="progressBar"></div>

<!-- Ambient Background -->
<div class="ambient">
  <div class="ambient-orb"></div>
  <div class="ambient-orb"></div>
  <div class="ambient-orb"></div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg" src="" alt="">
</div>

<!-- History Sidebar -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-title">Library</div>
    <button class="icon-btn" onclick="closeSidebar()" aria-label="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="sidebar-tabs">
    <button class="sidebar-tab active" data-tab="history" onclick="switchTab(this,'history')">History</button>
    <button class="sidebar-tab" data-tab="bookmarks" onclick="switchTab(this,'bookmarks')">Bookmarks</button>
  </div>
  <div class="sidebar-body" id="sidebarBody"></div>
</div>

<!-- Command Palette -->
<div class="command-palette-overlay" id="commandPalette" onclick="if(event.target===this)closeCommandPalette()">
  <div class="command-palette">
    <input class="command-palette-input" id="commandInput" placeholder="Type a command or search..." autocomplete="off">
    <div class="command-palette-list" id="commandList"></div>
  </div>
</div>

<!-- Main Shell -->
<div class="shell">

  <div class="topbar">
    <div class="tb-left">
      <div class="brand">Ask</div>
    </div>
    <div class="tb-right">
      <div class="status-dot"></div>
      <div id="clock"></div>
      <button class="icon-btn" onclick="openCommandPalette()" aria-label="Commands" title="Ctrl+K">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <button class="icon-btn" onclick="openSidebar()" aria-label="History" title="History">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </button>
    </div>
  </div>

  <div class="panel">

    <div class="input-area">
      <div class="input-wrapper">
        <span class="prompt-char">&rsaquo;</span>
        <input id="query" placeholder="Ask anything..." autocomplete="off" spellcheck="false">
        <button class="voice-btn" id="voiceBtn" onclick="toggleVoice()" aria-label="Voice input" title="Voice input">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </button>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-primary" id="searchBtn">Search</button>
      <button class="btn btn-secondary" id="aiBtn">Ask AI</button>
      <button class="btn btn-secondary" id="compareBtn" onclick="toggleCompare()">Compare</button>
      <button class="btn btn-danger" id="clearBtn">Clear</button>
      <div style="flex:1"></div>
      <button class="btn btn-icon" id="bookmarkBtn" onclick="bookmarkCurrent()" title="Bookmark" aria-label="Bookmark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      </button>
    </div>

    <!-- Compare Row (hidden by default) -->
    <div id="compareArea" style="display:none">
      <div class="input-area" style="border-bottom:1px solid var(--border);border-top:none">
        <div class="input-wrapper">
          <span class="prompt-char" style="color:var(--text-muted)">vs</span>
          <input id="query2" placeholder="Enter second topic to compare..." autocomplete="off" spellcheck="false">
        </div>
      </div>
    </div>

    <div class="shortcut-hint">
      <span class="kbd">/</span> Focus
      <span class="kbd">Enter</span> Search
      <span class="kbd">Ctrl+K</span> Commands
      <span class="kbd">Esc</span> Close
    </div>

    <div id="result">
      <!-- Empty state suggestions rendered by JS -->
    </div>

  </div>
</div>

<script>
/* ═══════════════════════════════════════
   DOM REFERENCES
   ═══════════════════════════════════════ */
const queryInput     = document.getElementById("query");
const query2Input    = document.getElementById("query2");
const searchBtn      = document.getElementById("searchBtn");
const aiBtn          = document.getElementById("aiBtn");
const clearBtn       = document.getElementById("clearBtn");
const compareBtn     = document.getElementById("compareBtn");
const compareArea    = document.getElementById("compareArea");
const resultDiv      = document.getElementById("result");
const clockEl        = document.getElementById("clock");
const voiceBtn       = document.getElementById("voiceBtn");
const toastContainer = document.getElementById("toastContainer");
const progressBar    = document.getElementById("progressBar");
const sidebarOverlay = document.getElementById("sidebarOverlay");
const sidebar        = document.getElementById("sidebar");
const sidebarBody    = document.getElementById("sidebarBody");
const lightbox       = document.getElementById("lightbox");
const lightboxImg    = document.getElementById("lightboxImg");
const commandPalette = document.getElementById("commandPalette");
const commandInput   = document.getElementById("commandInput");
const commandList    = document.getElementById("commandList");
const bookmarkBtn    = document.getElementById("bookmarkBtn");

/* ═══════════════════════════════════════
   CONFIG
   ═══════════════════════════════════════ */
const AI_WORKER_URL = "https://ask-ai.killermunu.workers.dev";

const SUGGESTIONS = [
  "Mitochondria", "DNA Replication", "Photosynthesis", "CRISPR",
  "Nebular Hypothesis", "Neural Networks", "Quantum Entanglement", "Black Holes"
];

/* ═══════════════════════════════════════
   STATE
   ═══════════════════════════════════════ */
let controller     = null;
const cache        = new Map();
const aiCache      = new Map();
let searchHistory  = JSON.parse(localStorage.getItem("ask_history") || "[]");
let bookmarks      = JSON.parse(localStorage.getItem("ask_bookmarks") || "[]");
let currentResult  = null; // {title, text, type}
let currentTab     = "history";
let recognition    = null;
let isListening    = false;

/* ═══════════════════════════════════════
   INIT
   ═══════════════════════════════════════ */
(function init() {
  renderSuggestions();
  updateClock();
  setInterval(updateClock, 1000);
  initVoice();
  setupEvents();
})();

function setupEvents() {
  searchBtn.addEventListener("click", execute);
  aiBtn.addEventListener("click", executeAI);
  clearBtn.addEventListener("click", clearAll);

  queryInput.addEventListener("keydown", e => {
    if (e.key === "Enter") execute();
  });
  query2Input.addEventListener("keydown", e => {
    if (e.key === "Enter") executeCompare();
  });

  // Keyboard shortcuts
  document.addEventListener("keydown", e => {
    // Ctrl+K / Cmd+K -> command palette
    if ((e.ctrlKey || e.metaKey) && e.key === "k") {
      e.preventDefault();
      openCommandPalette();
      return;
    }
    // / -> focus input
    if (e.key === "/" && document.activeElement !== queryInput && document.activeElement !== query2Input && document.activeElement !== commandInput) {
      e.preventDefault();
      queryInput.focus();
      return;
    }
    // Esc -> close overlays
    if (e.key === "Escape") {
      closeCommandPalette();
      closeSidebar();
      closeLightbox();
      if (isListening) stopVoice();
    }
  });

  // Reading progress
  resultDiv.addEventListener("scroll", () => {
    const { scrollTop, scrollHeight, clientHeight } = resultDiv;
    const pct = scrollHeight > clientHeight ? (scrollTop / (scrollHeight - clientHeight)) * 100 : 0;
    progressBar.style.width = pct + "%";
  });

  // Image click -> lightbox
  resultDiv.addEventListener("click", e => {
    if (e.target.tagName === "IMG" && e.target.closest("#result")) {
      lightboxImg.src = e.target.src;
      lightbox.classList.add("open");
    }
  });

  // Command palette input
  commandInput.addEventListener("input", filterCommands);
  commandInput.addEventListener("keydown", e => {
    if (e.key === "Enter") executeCommand();
    if (e.key === "ArrowDown" || e.key === "ArrowUp") navigateCommands(e);
  });
}

/* ═══════════════════════════════════════
   CLOCK
   ═══════════════════════════════════════ */
function updateClock() {
  const now = new Date();
  clockEl.textContent = now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}

/* ═══════════════════════════════════════
   SUGGESTIONS (EMPTY STATE)
   ═══════════════════════════════════════ */
function renderSuggestions() {
  const chips = SUGGESTIONS.map(s =>
    `<button class="chip" onclick="searchSuggestion('${escapeAttr(s)}')">${escapeHtml(s)}</button>`
  ).join("");

  resultDiv.innerHTML = `
    <div class="suggestions">
      <div class="suggestions-title">What would you like to know?</div>
      <div class="suggestions-sub">Search Wikipedia or ask AI anything. Press <span class="kbd">Ctrl+K</span> for commands.</div>
      <div class="chip-row">${chips}</div>
    </div>
  `;
}

function searchSuggestion(text) {
  queryInput.value = text;
  execute();
}

/* ═══════════════════════════════════════
   WIKIPEDIA SEARCH
   ═══════════════════════════════════════ */
async function execute() {
  const query = queryInput.value.trim();
  if (!query) return;

  if (handleCommand(query)) return;

  addToHistory(query);

  if (cache.has(query)) {
    renderWikiResult(cache.get(query));
    return;
  }

  if (controller) controller.abort();
  controller = new AbortController();

  resultDiv.innerHTML = `
    <div class="loading-state">
      <div class="loading-spinner"></div>
      <div class="loading-text">Searching...</div>
    </div>`;

  try {
    const wikiRes = await fetch(
      `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`,
      { signal: controller.signal }
    );

    if (wikiRes.ok) {
      const data = await wikiRes.json();
      cache.set(query, data);
      renderWikiResult(data);
      return;
    }
    throw new Error("Wiki not found");

  } catch(err) {
    if (err.name === "AbortError") return;

    try {
      const ddgRes = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json`);
      const ddgData = await ddgRes.json();

      if (ddgData.Abstract) {
        const fallback = { title: query, extract: ddgData.Abstract, thumbnail: ddgData.Image ? { source: ddgData.Image } : null };
        cache.set(query, fallback);
        renderWikiResult(fallback);
        return;
      }
      resultDiv.innerHTML = `<div class="result-enter" style="text-align:center;padding:48px 24px;color:var(--text-muted)">No results found. Try <strong style="color:var(--text)">Ask AI</strong> instead.</div>`;

    } catch {
      resultDiv.innerHTML = `<div class="result-enter" style="text-align:center;padding:48px 24px;color:var(--text-muted)">Something went wrong. Please try again.</div>`;
    }
  }
}

function renderWikiResult(data) {
  const words = data.extract ? data.extract.split(/\s+/).length : 0;
  const readTime = Math.ceil(words / 200);

  currentResult = { title: data.title || "", text: data.extract || "", type: "wiki" };

  let html = `<div class="result-enter">`;
  html += `<h2>${escapeHtml(data.title)}</h2>`;
  html += `<p>${data.extract || ""}</p>`;

  if (data.thumbnail && data.thumbnail.source) {
    html += `<img src="${data.thumbnail.source}" alt="${escapeAttr(data.title)}" loading="lazy">`;
  }

  html += `<div class="meta">
    <span class="meta-item">${words} words</span>
    <span class="meta-dot"></span>
    <span class="meta-item">${readTime} min read</span>
  </div>`;

  html += `<div class="action-bar">
    <button class="btn" onclick="copyResult()">Copy</button>
    <button class="btn" onclick="speakResult()">Speak</button>
    <button class="btn" onclick="downloadResult()">Download</button>
    <button class="btn" onclick="openWikiArticle()">Full Article</button>
  </div>`;

  html += `</div>`;
  resultDiv.innerHTML = html;
  resultDiv.scrollTop = 0;
  progressBar.style.width = "0%";
}

/* ═══════════════════════════════════════
   CLOUDFLARE AI (STREAMING)
   ═══════════════════════════════════════ */
async function executeAI() {
  const query = queryInput.value.trim();
  if (!query) return;

  addToHistory(query);

  resultDiv.innerHTML = `<div class="result-enter">
    <h2>${escapeHtml(query)}</h2>
    <div class="ai-block">
      <div class="ai-label"><div class="ai-label-dot"></div>AI Response</div>
      <div class="ai-text" id="aiText"><span class="ai-cursor"></span></div>
    </div>
  </div>`;

  const aiTextEl = document.getElementById("aiText");

  // Serve from cache
  if (aiCache.has(query)) {
    const cached = aiCache.get(query);
    currentResult = { title: query, text: cached, type: "ai" };
    typewriter(aiTextEl, cached, () => appendAIActions(resultDiv.querySelector(".ai-block"), query));
    return;
  }

  aiBtn.disabled = true;
  aiBtn.textContent = "Thinking...";

  try {
    const res = await fetch(AI_WORKER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query, stream: true })
    });

    if (!res.ok) throw new Error("HTTP " + res.status);

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let fullText = "";
    aiTextEl.innerHTML = '<span class="ai-cursor"></span>';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const chunk = decoder.decode(value, { stream: true });
      const lines = chunk.split("\n");
      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const payload = line.slice(6).trim();
        if (payload === "[DONE]") break;
        try {
          const parsed = JSON.parse(payload);
          const token = parsed.response || "";
          fullText += token;
          aiTextEl.innerHTML = renderMarkdown(fullText) + '<span class="ai-cursor"></span>';
          resultDiv.scrollTop = resultDiv.scrollHeight;
        } catch(_) {}
      }
    }

    if (!fullText) throw new Error("Empty response");
    aiCache.set(query, fullText);
    currentResult = { title: query, text: fullText, type: "ai" };
    aiTextEl.innerHTML = renderMarkdown(fullText);
    appendAIActions(resultDiv.querySelector(".ai-block"), query);

  } catch(err) {
    const errEl = document.getElementById("aiText");
    if (errEl) errEl.innerHTML = `<span style="color:#ff6b6b">Failed: ${escapeHtml(err.message)}</span>`;
  } finally {
    aiBtn.disabled = false;
    aiBtn.textContent = "Ask AI";
  }
}

/* ── Typewriter effect (for cached results) ── */
function typewriter(el, text, onComplete) {
  el.innerHTML = '<span class="ai-cursor"></span>';
  let i = 0;
  const cursor = el.querySelector(".ai-cursor");
  const iv = setInterval(() => {
    if (i < text.length) {
      cursor.insertAdjacentText("beforebegin", text[i++]);
      resultDiv.scrollTop = resultDiv.scrollHeight;
    } else {
      clearInterval(iv);
      cursor.remove();
      el.innerHTML = renderMarkdown(text);
      if (onComplete) onComplete();
    }
  }, 12);
}

function appendAIActions(block, query) {
  if (!block) return;
  const bar = document.createElement("div");
  bar.className = "action-bar";
  bar.innerHTML = `
    <button class="btn" onclick="copyResult()">Copy</button>
    <button class="btn" onclick="speakResult()">Speak</button>
    <button class="btn" onclick="downloadResult()">Download</button>
  `;
  block.appendChild(bar);
}

/* ═══════════════════════════════════════
   COMPARE
   ═══════════════════════════════════════ */
let compareVisible = false;

function toggleCompare() {
  compareVisible = !compareVisible;
  if (compareVisible) {
    compareArea.style.display = "block";
    compareArea.style.animation = "fadeIn .3s ease both";
    query2Input.focus();
    compareBtn.textContent = "Go";
    compareBtn.className = "btn btn-primary";
    compareBtn.onclick = executeCompare;
  } else {
    compareArea.style.display = "none";
    query2Input.value = "";
    compareBtn.textContent = "Compare";
    compareBtn.className = "btn btn-secondary";
    compareBtn.onclick = toggleCompare;
  }
}

async function executeCompare() {
  const q1 = queryInput.value.trim();
  const q2 = query2Input.value.trim();

  if (!q1 || !q2) {
    showToast("Enter both topics to compare", "warning");
    return;
  }

  addToHistory(`${q1} vs ${q2}`);

  resultDiv.innerHTML = `<div class="result-enter">
    <h2>${escapeHtml(q1)} vs ${escapeHtml(q2)}</h2>
    <div class="ai-block">
      <div class="ai-label"><div class="ai-label-dot"></div>AI Comparison</div>
      <div class="ai-text" id="compareText"><span class="ai-cursor"></span></div>
    </div>
  </div>`;

  const compareTextEl = document.getElementById("compareText");

  compareBtn.disabled = true;
  compareBtn.textContent = "Comparing...";

  const prompt = `Compare these two topics clearly and structured: "${q1}" vs "${q2}". Cover: definitions, key differences, similarities, and notable points. Keep it under 300 words. Plain text, no markdown.`;

  try {
    const res = await fetch(AI_WORKER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query: prompt })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    currentResult = { title: `${q1} vs ${q2}`, text: data.answer || "", type: "compare" };

    typewriter(compareTextEl, data.answer || "", () => {
      const bar = document.createElement("div");
      bar.className = "action-bar";
      bar.innerHTML = `
        <button class="btn" onclick="copyResult()">Copy</button>
        <button class="btn" onclick="speakResult()">Speak</button>
        <button class="btn" onclick="downloadResult()">Download</button>
      `;
      resultDiv.querySelector(".ai-block").appendChild(bar);
    });

  } catch(err) {
    compareTextEl.innerHTML = `<span style="color:#ff6b6b">Failed: ${escapeHtml(err.message)}</span>`;
  } finally {
    compareBtn.disabled = false;
    compareBtn.textContent = "Go";
  }
}

/* ═══════════════════════════════════════
   CLEAR
   ═══════════════════════════════════════ */
function clearAll() {
  resultDiv.innerHTML = "";
  queryInput.value = "";
  query2Input.value = "";
  currentResult = null;
  progressBar.style.width = "0%";

  if (compareVisible) toggleCompare();

  renderSuggestions();
  showToast("Cleared", "check");
}

/* ═══════════════════════════════════════
   COMMAND SYSTEM
   ═══════════════════════════════════════ */
function handleCommand(cmd) {
  const c = cmd.toLowerCase();
  if (c === "clear")   { clearAll(); return true; }
  if (c === "history") {
    openSidebar();
    return true;
  }
  if (c === "help")    {
    resultDiv.innerHTML = `<div class="result-enter">
      <h2>Commands</h2>
      <p><strong>clear</strong> — Reset the panel</p>
      <p><strong>history</strong> — Open search history</p>
      <p><strong>help</strong> — Show this help</p>
      <p><strong>about</strong> — About this tool</p>
      <p style="margin-top:16px;color:var(--text-muted)">Shortcuts: <span class="kbd">/</span> Focus &nbsp; <span class="kbd">Ctrl+K</span> Commands &nbsp; <span class="kbd">Esc</span> Close</p>
    </div>`;
    return true;
  }
  if (c === "about")   {
    resultDiv.innerHTML = `<div class="result-enter">
      <h2>About</h2>
      <p>Ask is a modern, Apple-inspired knowledge panel. Search Wikipedia, ask AI questions, compare topics, and more — all from a single interface.</p>
      <p style="color:var(--text-muted)">Built with care. Zero frameworks. Pure HTML, CSS, and JavaScript.</p>
    </div>`;
    return true;
  }
  return false;
}

/* ═══════════════════════════════════════
   SHARED ACTIONS
   ═══════════════════════════════════════ */
function copyResult() {
  if (!currentResult || !currentResult.text) return;
  navigator.clipboard.writeText(currentResult.text).then(() => {
    showToast("Copied to clipboard", "check");
  });
}

function speakResult() {
  if (!currentResult || !currentResult.text) return;
  speakContent(currentResult.text);
  showToast("Speaking...", "volume");
}

function downloadResult() {
  if (!currentResult || !currentResult.text) return;
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([currentResult.text], { type: "text/plain" }));
  a.download = (currentResult.title || "result") + ".txt";
  a.click();
  showToast("Downloaded", "download");
}

function openWikiArticle() {
  if (currentResult && currentResult.type === "wiki" && currentResult.title) {
    window.open(`https://en.wikipedia.org/wiki/${encodeURIComponent(currentResult.title)}`, "_blank");
  }
}

/* ═══════════════════════════════════════
   BOOKMARKS
   ═══════════════════════════════════════ */
function bookmarkCurrent() {
  if (!currentResult) {
    showToast("Nothing to bookmark", "warning");
    return;
  }
  const exists = bookmarks.findIndex(b => b.title === currentResult.title);
  if (exists >= 0) {
    bookmarks.splice(exists, 1);
    showToast("Removed from bookmarks", "bookmark-remove");
  } else {
    bookmarks.unshift({
      title: currentResult.title,
      text: currentResult.text,
      type: currentResult.type,
      time: Date.now()
    });
    showToast("Bookmarked", "bookmark");
  }
  saveBookmarks();
}

function saveBookmarks() {
  localStorage.setItem("ask_bookmarks", JSON.stringify(bookmarks.slice(0, 50)));
}

/* ═══════════════════════════════════════
   HISTORY
   ═══════════════════════════════════════ */
function addToHistory(query) {
  searchHistory = searchHistory.filter(h => h !== query);
  searchHistory.unshift(query);
  if (searchHistory.length > 100) searchHistory.length = 100;
  localStorage.setItem("ask_history", JSON.stringify(searchHistory));
}

/* ═══════════════════════════════════════
   SIDEBAR
   ═══════════════════════════════════════ */
function openSidebar() {
  sidebarOverlay.classList.add("open");
  sidebar.classList.add("open");
  renderSidebarContent();
}

function closeSidebar() {
  sidebarOverlay.classList.remove("open");
  sidebar.classList.remove("open");
}

function switchTab(tabEl, tab) {
  currentTab = tab;
  document.querySelectorAll(".sidebar-tab").forEach(t => t.classList.remove("active"));
  tabEl.classList.add("active");
  renderSidebarContent();
}

function renderSidebarContent() {
  if (currentTab === "history") {
    if (searchHistory.length === 0) {
      sidebarBody.innerHTML = `<div class="sidebar-empty">
        <div>No search history yet</div>
        <div style="font-size:.72rem;color:var(--text-muted)">Your searches will appear here</div>
      </div>`;
      return;
    }
    sidebarBody.innerHTML = searchHistory.map(h => `
      <div class="history-item" onclick="searchFromHistory('${escapeAttr(h)}')">
        <div class="history-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </div>
        <div class="history-text">${escapeHtml(h)}</div>
      </div>
    `).join("");
  } else if (currentTab === "bookmarks") {
    if (bookmarks.length === 0) {
      sidebarBody.innerHTML = `<div class="sidebar-empty">
        <div>No bookmarks yet</div>
        <div style="font-size:.72rem;color:var(--text-muted)">Save answers you want to keep</div>
      </div>`;
      return;
    }
    sidebarBody.innerHTML = bookmarks.map(b => `
      <div class="history-item" onclick="loadBookmark(${b.time})">
        <div class="history-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        </div>
        <div class="history-text">${escapeHtml(b.title)}</div>
      </div>
    `).join("");
  }
}

function searchFromHistory(query) {
  closeSidebar();
  queryInput.value = query;
  execute();
}

function loadBookmark(time) {
  const bm = bookmarks.find(b => b.time === time);
  if (!bm) return;
  closeSidebar();
  currentResult = { title: bm.title, text: bm.text, type: bm.type };
  queryInput.value = bm.title;
  resultDiv.innerHTML = `<div class="result-enter">
    <h2>${escapeHtml(bm.title)}</h2>
    <p>${escapeHtml(bm.text)}</p>
    <div class="action-bar">
      <button class="btn" onclick="copyResult()">Copy</button>
      <button class="btn" onclick="speakResult()">Speak</button>
      <button class="btn" onclick="downloadResult()">Download</button>
    </div>
  </div>`;
  resultDiv.scrollTop = 0;
}

/* ═══════════════════════════════════════
   COMMAND PALETTE
   ═══════════════════════════════════════ */
const COMMANDS = [
  { label: "Search Wikipedia", desc: "Search for the current query", action: () => { execute(); closeCommandPalette(); } },
  { label: "Ask AI", desc: "Send query to AI", action: () => { executeAI(); closeCommandPalette(); } },
  { label: "Compare Topics", desc: "Toggle compare mode", action: () => { toggleCompare(); closeCommandPalette(); } },
  { label: "Clear", desc: "Reset everything", action: () => { clearAll(); closeCommandPalette(); } },
  { label: "Open History", desc: "View search history", action: () => { openSidebar(); closeCommandPalette(); } },
  { label: "Bookmark", desc: "Bookmark current result", action: () => { bookmarkCurrent(); closeCommandPalette(); } },
  { label: "Copy Result", desc: "Copy to clipboard", action: () => { copyResult(); closeCommandPalette(); } },
  { label: "Speak Result", desc: "Read aloud", action: () => { speakResult(); closeCommandPalette(); } },
  { label: "Download Result", desc: "Save as text file", action: () => { downloadResult(); closeCommandPalette(); } },
];

let activeCommandIdx = 0;

function openCommandPalette() {
  commandPalette.classList.add("open");
  commandInput.value = "";
  activeCommandIdx = 0;
  filterCommands();
  setTimeout(() => commandInput.focus(), 100);
}

function closeCommandPalette() {
  commandPalette.classList.remove("open");
}

function filterCommands() {
  const q = commandInput.value.toLowerCase();
  const filtered = COMMANDS.filter(c =>
    c.label.toLowerCase().includes(q) || c.desc.toLowerCase().includes(q)
  );
  activeCommandIdx = 0;
  renderCommandList(filtered);
}

function renderCommandList(items) {
  commandList.innerHTML = items.map((c, i) => `
    <div class="command-item${i === activeCommandIdx ? ' active' : ''}" data-idx="${i}" onclick="runCommand(${COMMANDS.indexOf(c)})">
      <span class="command-item-label">${escapeHtml(c.label)} <span style="color:var(--text-muted);font-weight:400;font-size:.75rem">${escapeHtml(c.desc)}</span></span>
    </div>
  `).join("");
}

function navigateCommands(e) {
  const items = commandList.querySelectorAll(".command-item");
  if (!items.length) return;
  items[activeCommandIdx]?.classList.remove("active");
  if (e.key === "ArrowDown") activeCommandIdx = Math.min(activeCommandIdx + 1, items.length - 1);
  if (e.key === "ArrowUp") activeCommandIdx = Math.max(activeCommandIdx - 1, 0);
  items[activeCommandIdx]?.classList.add("active");
  items[activeCommandIdx]?.scrollIntoView({ block: "nearest" });
}

function executeCommand() {
  const q = commandInput.value.toLowerCase();
  const filtered = COMMANDS.filter(c =>
    c.label.toLowerCase().includes(q) || c.desc.toLowerCase().includes(q)
  );
  if (filtered[activeCommandIdx]) {
    filtered[activeCommandIdx].action();
  }
}

function runCommand(idx) {
  COMMANDS[idx]?.action();
}

/* ═══════════════════════════════════════
   VOICE INPUT
   ═══════════════════════════════════════ */
function initVoice() {
  if (!("webkitSpeechRecognition" in window) && !("SpeechRecognition" in window)) {
    voiceBtn.style.display = "none";
    return;
  }
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = "en-US";

  recognition.onresult = e => {
    const transcript = Array.from(e.results)
      .map(r => r[0].transcript)
      .join("");
    queryInput.value = transcript;
  };

  recognition.onend = () => {
    isListening = false;
    voiceBtn.classList.remove("listening");
    if (queryInput.value.trim()) {
      execute();
    }
  };

  recognition.onerror = () => {
    isListening = false;
    voiceBtn.classList.remove("listening");
  };
}

function toggleVoice() {
  if (isListening) {
    stopVoice();
  } else {
    startVoice();
  }
}

function startVoice() {
  if (!recognition) return;
  isListening = true;
  voiceBtn.classList.add("listening");
  recognition.start();
  showToast("Listening...", "mic");
}

function stopVoice() {
  if (!recognition) return;
  isListening = false;
  voiceBtn.classList.remove("listening");
  recognition.stop();
}

/* ═══════════════════════════════════════
   TEXT-TO-SPEECH
   ═══════════════════════════════════════ */
function speakContent(text) {
  if (!text) return;
  speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);

  function pickVoice() {
    const v = speechSynthesis.getVoices();
    return (
      v.find(x => x.name.toLowerCase().includes("samantha")) ||
      v.find(x => x.name.toLowerCase().includes("microsoft") && x.name.toLowerCase().includes("neural")) ||
      v.find(x => x.name.toLowerCase().includes("google") && x.lang.startsWith("en")) ||
      v.find(x => x.lang.startsWith("en")) ||
      v[0]
    );
  }

  function apply() {
    const voice = pickVoice();
    if (voice) utter.voice = voice;
    utter.rate = 1;
    utter.pitch = 1;
    utter.volume = 1;
    speechSynthesis.speak(utter);
  }

  speechSynthesis.getVoices().length === 0
    ? (speechSynthesis.onvoiceschanged = apply)
    : apply();
}

/* ═══════════════════════════════════════
   LIGHTBOX
   ═══════════════════════════════════════ */
function closeLightbox() {
  lightbox.classList.remove("open");
}

/* ═══════════════════════════════════════
   TOAST SYSTEM
   ═══════════════════════════════════════ */
const TOAST_ICONS = {
  check: `<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>`,
  copy: `<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`,
  volume: `<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>`,
  download: `<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,
  warning: `<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
  bookmark: `<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>`,
  "bookmark-remove": `<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>`,
  mic: `<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/></svg>`,
};

function showToast(message, icon = "check") {
  const toast = document.createElement("div");
  toast.className = "toast";
  toast.innerHTML = `${TOAST_ICONS[icon] || TOAST_ICONS.check}<span>${escapeHtml(message)}</span>`;
  toastContainer.appendChild(toast);

  setTimeout(() => {
    toast.classList.add("out");
    setTimeout(() => toast.remove(), 300);
  }, 2000);
}

/* ═══════════════════════════════════════
   BASIC MARKDOWN
   ═══════════════════════════════════════ */
function renderMarkdown(text) {
  return text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/\*(.+?)\*/g, "<em>$1</em>")
    .replace(/`(.+?)`/g, "<code>$1</code>")
    .replace(/^[-*] (.+)$/gm, "<li>$1</li>")
    .replace(/^(\d+)\. (.+)$/gm, "<li>$2</li>");
}

/* ═══════════════════════════════════════
   UTILITIES
   ═══════════════════════════════════════ */
function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = String(str);
  return div.innerHTML;
}

function escapeAttr(str) {
  return String(str).replace(/'/g, "\\'").replace(/"/g, '&quot;');
}
