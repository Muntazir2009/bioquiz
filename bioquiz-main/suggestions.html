<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suggestions • BioQuiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --void:#04030f;
  --deep:#080618;
  --violet:#9b6dff;
  --violet-glow:rgba(155,109,255,.4);
  --violet-soft:rgba(155,109,255,.1);
  --pink:#f472b6;
  --teal:#2dd4bf;
  --amber:#fbbf24;
  --coral:#fb7185;
  --green:#34d399;
  --text:#e8dff8;
  --text-dim:#9080b8;
  --label:#c4b0e8;
  --muted:#4a3d6a;
  --border:rgba(155,109,255,.2);
}
html{scroll-behavior:smooth}
body{background:var(--void);color:var(--text);font-family:'Exo 2',sans-serif;min-height:100vh;overflow-x:hidden}

#stars{position:fixed;inset:0;z-index:0;pointer-events:none}
.aurora{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 130% 60% at 50% -8%,rgba(100,40,255,.18) 0%,transparent 58%),
    radial-gradient(ellipse 60% 60% at 95% 90%,rgba(244,114,182,.1) 0%,transparent 55%),
    radial-gradient(ellipse 50% 45% at 0% 70%,rgba(45,212,191,.07) 0%,transparent 50%);
}
.grid-bg{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(155,109,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(155,109,255,.03) 1px,transparent 1px);
  background-size:52px 52px;
  mask-image:radial-gradient(ellipse 85% 85% at 50% 50%,black 0%,transparent 80%);
}
.scanlines{position:fixed;inset:0;z-index:1;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.03) 3px,rgba(0,0,0,.03) 4px)}

/* TOPBAR */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:500;height:58px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 clamp(14px,4vw,52px);
  background:rgba(4,3,15,.88);backdrop-filter:blur(22px);
  border-bottom:1px solid rgba(155,109,255,.1);
  animation:fadeDown .6s ease .1s both;
}
.tb-left{display:flex;align-items:center;gap:10px;text-decoration:none}
.tb-ic{width:30px;height:30px;border-radius:8px;background:rgba(155,109,255,.12);border:1px solid rgba(155,109,255,.3);display:flex;align-items:center;justify-content:center}
.tb-ic svg{width:14px;height:14px;stroke:var(--violet);fill:none;stroke-width:1.6}
.tb-name{font-family:'Orbitron',monospace;font-size:.7rem;font-weight:700;letter-spacing:.22em;color:var(--violet)}
.tb-pulse{width:5px;height:5px;border-radius:50%;background:var(--violet);box-shadow:0 0 8px var(--violet);animation:pulse 2.5s ease infinite}
.tb-right{display:flex;align-items:center;gap:9px}
.tb-pill{display:flex;align-items:center;gap:6px;text-decoration:none;font-family:'Orbitron',monospace;font-size:.46rem;letter-spacing:.13em;padding:6px 14px;border-radius:20px;transition:all .2s;white-space:nowrap}
.tb-pill.ghost{color:var(--text-dim);border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03)}
.tb-pill.ghost:hover{color:var(--violet);border-color:rgba(155,109,255,.35);background:rgba(155,109,255,.08)}
.tb-pill.accent{color:var(--pink);border:1px solid rgba(244,114,182,.25);background:rgba(244,114,182,.06)}
.tb-pill.accent:hover{background:rgba(244,114,182,.14);border-color:rgba(244,114,182,.45)}
.tb-pill svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
#live-count{
  font-family:'Orbitron',monospace;font-size:.44rem;letter-spacing:.1em;
  color:var(--teal);padding:5px 12px;border-radius:20px;
  border:1px solid rgba(45,212,191,.22);background:rgba(45,212,191,.06);
  display:flex;align-items:center;gap:5px;
}
#live-count::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--teal);box-shadow:0 0 5px var(--teal);animation:pulse 2s ease infinite}

/* PAGE */
.page{position:relative;z-index:2;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:80px clamp(14px,4vw,40px) 60px}

/* CARD */
.card{
  width:100%;max-width:500px;
  background:linear-gradient(150deg,rgba(12,8,30,.98),rgba(7,5,20,.99));
  border:1px solid rgba(155,109,255,.18);
  border-radius:24px;
  padding:40px 36px 34px;
  box-shadow:
    0 0 0 1px rgba(155,109,255,.06) inset,
    0 2px 0 rgba(155,109,255,.12) inset,
    0 40px 100px rgba(0,0,0,.75),
    0 0 100px rgba(100,40,255,.06);
  position:relative;overflow:hidden;
  animation:fadeUp .85s cubic-bezier(.16,1,.3,1) .3s both;
}
/* shimmer top */
.card::before{
  content:'';position:absolute;top:0;left:6%;width:88%;height:1px;
  background:linear-gradient(to right,transparent,rgba(155,109,255,.6),rgba(244,114,182,.4),transparent);
}
/* ambient corner */
.card::after{
  content:'';position:absolute;top:-100px;right:-100px;width:260px;height:260px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(155,109,255,.07) 0%,transparent 65%);
  pointer-events:none;
}
/* bottom corner */
.card-bg2{position:absolute;bottom:-80px;left:-80px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(45,212,191,.04) 0%,transparent 65%);pointer-events:none}

/* HEADER */
.c-head{text-align:center;margin-bottom:32px}
.c-eyebrow{
  font-family:'Orbitron',monospace;font-size:.46rem;letter-spacing:.4em;
  color:var(--violet);margin-bottom:12px;
  display:flex;align-items:center;justify-content:center;gap:12px;
  opacity:.8;
}
.c-eyebrow::before,.c-eyebrow::after{content:'';flex:1;max-width:36px;height:1px;background:linear-gradient(to var(--d),rgba(155,109,255,.7),transparent);--d:right;opacity:.8}
.c-eyebrow::after{--d:left}
.c-title{
  font-family:'Orbitron',monospace;font-size:1.7rem;font-weight:900;
  letter-spacing:.04em;margin-bottom:8px;
  background:linear-gradient(135deg,#fff 30%,rgba(155,109,255,.9) 70%,rgba(244,114,182,.8) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.c-sub{font-size:.84rem;font-weight:300;color:var(--text-dim);letter-spacing:.03em}

/* LABELS */
.f-label{
  font-family:'Orbitron',monospace;font-size:.48rem;letter-spacing:.2em;
  color:var(--label);
  margin-bottom:9px;display:flex;align-items:center;gap:8px;
}
.f-label .ll{width:12px;height:1px;background:var(--violet);opacity:.7;flex-shrink:0}
.f-label .req{color:var(--coral);margin-left:1px;font-size:.52rem}

.field{margin-bottom:20px}

/* TYPE BUTTONS */
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.t-btn{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;border-radius:12px;cursor:pointer;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.03);
  transition:all .22s;
}
.t-btn:hover{border-color:rgba(155,109,255,.3);background:rgba(155,109,255,.07)}
.t-ico{
  width:34px;height:34px;border-radius:9px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);
  transition:all .22s;
}
.t-ico svg{width:15px;height:15px;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;stroke:rgba(255,255,255,.3);transition:stroke .2s}
.t-name{font-size:.78rem;font-weight:600;color:rgba(232,223,248,.55);transition:color .2s}
.t-hint{font-size:.6rem;font-weight:300;color:var(--muted);transition:color .2s;margin-top:1px}

/* active states per type */
.t-btn[data-t="Feature Request"].active{border-color:rgba(155,109,255,.5);background:rgba(155,109,255,.12)}
.t-btn[data-t="Feature Request"].active .t-ico{border-color:rgba(155,109,255,.45);background:rgba(155,109,255,.16)}
.t-btn[data-t="Feature Request"].active .t-ico svg{stroke:var(--violet)}
.t-btn[data-t="Feature Request"].active .t-name{color:var(--violet)}
.t-btn[data-t="Feature Request"].active .t-hint{color:rgba(155,109,255,.6)}

.t-btn[data-t="Bug Report"].active{border-color:rgba(251,113,133,.5);background:rgba(251,113,133,.1)}
.t-btn[data-t="Bug Report"].active .t-ico{border-color:rgba(251,113,133,.45);background:rgba(251,113,133,.16)}
.t-btn[data-t="Bug Report"].active .t-ico svg{stroke:var(--coral)}
.t-btn[data-t="Bug Report"].active .t-name{color:var(--coral)}
.t-btn[data-t="Bug Report"].active .t-hint{color:rgba(251,113,133,.6)}

.t-btn[data-t="Content Improvement"].active{border-color:rgba(251,191,36,.5);background:rgba(251,191,36,.09)}
.t-btn[data-t="Content Improvement"].active .t-ico{border-color:rgba(251,191,36,.45);background:rgba(251,191,36,.15)}
.t-btn[data-t="Content Improvement"].active .t-ico svg{stroke:var(--amber)}
.t-btn[data-t="Content Improvement"].active .t-name{color:var(--amber)}
.t-btn[data-t="Content Improvement"].active .t-hint{color:rgba(251,191,36,.6)}

.t-btn[data-t="Other"].active{border-color:rgba(45,212,191,.5);background:rgba(45,212,191,.09)}
.t-btn[data-t="Other"].active .t-ico{border-color:rgba(45,212,191,.45);background:rgba(45,212,191,.15)}
.t-btn[data-t="Other"].active .t-ico svg{stroke:var(--teal)}
.t-btn[data-t="Other"].active .t-name{color:var(--teal)}
.t-btn[data-t="Other"].active .t-hint{color:rgba(45,212,191,.6)}

/* INPUTS */
input[type=text],textarea{
  width:100%;padding:13px 16px;
  background:rgba(12,8,28,.95);
  border:1px solid rgba(155,109,255,.2);
  border-radius:12px;
  color:var(--text);
  font-family:'Exo 2',sans-serif;font-size:.92rem;font-weight:400;
  outline:none;
  transition:border-color .22s,box-shadow .22s;
  line-height:1.55;
}
input[type=text]::placeholder,textarea::placeholder{color:var(--muted)}
input[type=text]:focus,textarea:focus{
  border-color:rgba(155,109,255,.5);
  box-shadow:0 0 0 3px rgba(155,109,255,.08),0 0 22px rgba(155,109,255,.08);
}
textarea{resize:vertical;min-height:120px}

/* CHAR COUNT */
.char-row{display:flex;justify-content:flex-end;margin-top:5px}
.char-count{font-family:'Orbitron',monospace;font-size:.4rem;letter-spacing:.06em;color:var(--muted)}
.char-count.warn{color:var(--amber)}.char-count.over{color:var(--coral)}

/* SUBMIT */
.submit-btn{
  width:100%;padding:15px;border-radius:12px;cursor:pointer;
  background:linear-gradient(135deg,rgba(155,109,255,.22),rgba(100,40,255,.14));
  border:1px solid rgba(155,109,255,.4);
  color:#d4bbff;
  font-family:'Orbitron',monospace;font-size:.62rem;font-weight:700;letter-spacing:.16em;
  transition:all .25s;display:flex;align-items:center;justify-content:center;gap:9px;
  box-shadow:0 0 30px rgba(155,109,255,.1);
  margin-top:8px;
}
.submit-btn:hover:not(:disabled){
  background:linear-gradient(135deg,rgba(155,109,255,.32),rgba(100,40,255,.22));
  box-shadow:0 0 50px rgba(155,109,255,.25);
  transform:translateY(-2px);
  color:#fff;
}
.submit-btn:active:not(:disabled){transform:translateY(0)}
.submit-btn:disabled{opacity:.38;cursor:not-allowed}
.submit-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}

/* MESSAGE */
.msg{
  margin-top:14px;text-align:center;
  font-family:'Orbitron',monospace;font-size:.5rem;letter-spacing:.08em;
  padding:13px 16px;border-radius:10px;display:none;line-height:1.75;white-space:pre-line;
}
.msg.ok{color:var(--green);border:1px solid rgba(52,211,153,.22);background:rgba(52,211,153,.06)}
.msg.err{color:#fca5a5;border:1px solid rgba(252,165,165,.2);background:rgba(252,165,165,.05)}
.msg.loading{color:var(--violet);border:1px solid rgba(155,109,255,.2);background:rgba(155,109,255,.06)}

/* DIVIDER */
.sep{height:1px;background:linear-gradient(to right,transparent,rgba(155,109,255,.18),transparent);margin:22px 0}

@keyframes fadeDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
@media(max-width:540px){.card{padding:26px 18px 24px}.type-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="aurora"></div>
<div class="grid-bg"></div>
<div class="scanlines"></div>

<svg style="display:none" xmlns="http://www.w3.org/2000/svg">
  <symbol id="i-dna" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 3c0 6 16 6 16 9S4 15 4 21"/><path d="M20 3c0 6-16 6-16 9s16 3 16 9"/><line x1="7.5" y1="8.5" x2="16.5" y2="8.5"/><line x1="7.5" y1="15.5" x2="16.5" y2="15.5"/></symbol>
  <symbol id="i-back" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15,18 9,12 15,6"/></symbol>
  <symbol id="i-list" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></symbol>
  <symbol id="i-send" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></symbol>
  <symbol id="i-feat" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></symbol>
  <symbol id="i-bug" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2l1.88 1.88M16 2l-1.88 1.88"/><path d="M9 7.13v-1a3.003 3.003 0 1 1 6 0v1"/><path d="M12 20c-3.3 0-6-2.7-6-6v-3a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v3c0 3.3-2.7 6-6 6z"/><line x1="6" y1="13" x2="2" y2="13"/><line x1="22" y1="13" x2="18" y2="13"/><line x1="6" y1="17" x2="2" y2="17"/><line x1="22" y1="17" x2="18" y2="17"/></symbol>
  <symbol id="i-content" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></symbol>
  <symbol id="i-other" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></symbol>
</svg>

<div class="topbar">
  <a href="index.html" class="tb-left">
    <div class="tb-ic"><svg><use href="#i-dna"/></svg></div>
    <span class="tb-name">BIOQUIZ</span>
    <div class="tb-pulse"></div>
  </a>
  <div class="tb-right">
    <div id="live-count">— SUBMISSIONS</div>
    <a href="my-suggestions.html" class="tb-pill accent"><svg><use href="#i-list"/></svg> VIEW ALL</a>
    <a href="index.html" class="tb-pill ghost"><svg><use href="#i-back"/></svg> BACK</a>
  </div>
</div>

<div class="page">
  <div class="card">
    <div class="card-bg2"></div>

    <div class="c-head">
      <div class="c-eyebrow">MODULE 007</div>
      <div class="c-title">SUGGESTIONS</div>
      <div class="c-sub">Ideas, bugs, feedback — help shape BioQuiz</div>
    </div>

    <div class="field">
      <div class="f-label"><div class="ll"></div>SUGGESTION TYPE <span class="req">*</span></div>
      <div class="type-grid">
        <button class="t-btn active" data-t="Feature Request" onclick="selType(this)">
          <div class="t-ico"><svg><use href="#i-feat"/></svg></div>
          <div><div class="t-name">Feature Request</div><div class="t-hint">New idea</div></div>
        </button>
        <button class="t-btn" data-t="Bug Report" onclick="selType(this)">
          <div class="t-ico"><svg><use href="#i-bug"/></svg></div>
          <div><div class="t-name">Bug Report</div><div class="t-hint">Something broken</div></div>
        </button>
        <button class="t-btn" data-t="Content Improvement" onclick="selType(this)">
          <div class="t-ico"><svg><use href="#i-content"/></svg></div>
          <div><div class="t-name">Content</div><div class="t-hint">Questions / material</div></div>
        </button>
        <button class="t-btn" data-t="Other" onclick="selType(this)">
          <div class="t-ico"><svg><use href="#i-other"/></svg></div>
          <div><div class="t-name">Other</div><div class="t-hint">Anything else</div></div>
        </button>
      </div>
    </div>

    <div class="sep"></div>

    <div class="field">
      <div class="f-label"><div class="ll"></div>YOUR NAME</div>
      <input type="text" id="nameInput" placeholder="Anonymous (optional)" maxlength="60" autocomplete="off">
    </div>

    <div class="field">
      <div class="f-label"><div class="ll"></div>YOUR SUGGESTION <span class="req">*</span></div>
      <textarea id="suggInput" placeholder="Describe your idea, bug, or feedback in detail…" maxlength="600" oninput="updateCount()"></textarea>
      <div class="char-row"><div class="char-count" id="charCount">0 / 600</div></div>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="submitSuggestion()">
      <svg><use href="#i-send"/></svg> TRANSMIT SUGGESTION
    </button>
    <div class="msg" id="msg"></div>
  </div>
</div>

<script>
const cv=document.getElementById("stars"),cx=cv.getContext("2d");let ST=[];
function resize(){cv.width=innerWidth;cv.height=innerHeight;ST=[];const n=Math.floor(cv.width*cv.height/2600);for(let i=0;i<n;i++)ST.push({x:Math.random()*cv.width,y:Math.random()*cv.height,r:Math.random()*1.4+.2,a:Math.random()*.7+.15,tw:Math.random()*Math.PI*2,sp:Math.random()*.028+.006,col:Math.random()>.88?"#c4aaff":Math.random()>.82?"#f0aacc":"#fff"})}
function draw(){cx.clearRect(0,0,cv.width,cv.height);ST.forEach(s=>{s.tw+=s.sp;const a=s.a*(.35+.65*Math.sin(s.tw));cx.save();cx.globalAlpha=a;cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fillStyle=s.col;cx.fill();cx.restore()});requestAnimationFrame(draw)}
window.addEventListener("resize",resize);resize();draw();

let sv="Feature Request";
function selType(el){document.querySelectorAll(".t-btn").forEach(b=>b.classList.remove("active"));el.classList.add("active");sv=el.dataset.t}
function updateCount(){const n=document.getElementById("suggInput").value.length;const el=document.getElementById("charCount");el.textContent=n+" / 600";el.className="char-count"+(n>500?" warn":n>=600?" over":"")}

async function loadCount(){try{const r=await fetch("https://bioquiz-suggestion.killermunu.workers.dev");const d=await r.json();const n=Array.isArray(d)?d.length:0;document.getElementById("live-count").textContent=n+" SUBMISSION"+(n!==1?"S":"")}catch{}}
loadCount();

async function submitSuggestion(){
  const name=document.getElementById("nameInput").value.trim();
  const sugg=document.getElementById("suggInput").value.trim();
  if(!sugg){showMsg("Please write your suggestion before submitting.","err");return}
  const btn=document.getElementById("submitBtn");btn.disabled=true;showMsg("TRANSMITTING...","loading");
  try{
    const fd=new FormData();fd.append("name",name||"Anonymous");fd.append("type",sv);fd.append("suggestion",sugg);
    const res=await fetch("https://bioquiz-suggestion.killermunu.workers.dev",{method:"POST",body:fd});
    if(!res.ok)throw new Error();
    showMsg("✓ SUGGESTION RECEIVED\nThank you — your feedback helps make BioQuiz better.","ok");
    document.getElementById("nameInput").value="";document.getElementById("suggInput").value="";updateCount();
    document.querySelectorAll(".t-btn").forEach(b=>b.classList.remove("active"));
    document.querySelector('.t-btn[data-t="Feature Request"]').classList.add("active");
    sv="Feature Request";loadCount();
  }catch{showMsg("TRANSMISSION FAILED\nCheck your connection and try again.","err")}
  finally{btn.disabled=false}
}
function showMsg(text,type){const m=document.getElementById("msg");m.textContent=text;m.className="msg "+type;m.style.display="block";if(type==="ok")setTimeout(()=>{m.style.display="none"},5500)}
</script>
